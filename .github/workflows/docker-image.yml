name: Docker Build and Push

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY_USER: ikun11451
  IMAGE_BASE: neo-mofox

# Workflow's jobs
jobs:
  build-amd64:
    name: Build AMD64 Image
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      # Log in docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build and push AMD64 image by digest
      - name: Build and push AMD64
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          push: true
          outputs: type=image,name=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }},push-by-digest=true,name-canonical=true
          cache-from: type=registry,ref=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:amd64-cache
          cache-to: type=registry,ref=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:amd64-cache,mode=max

  build-arm64:
    name: Build ARM64 Image
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      # Log in docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build and push ARM64 image by digest
      - name: Build and push ARM64
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          file: ./Dockerfile
          push: true
          outputs: type=image,name=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }},push-by-digest=true,name-canonical=true
          cache-from: type=registry,ref=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:arm64-cache
          cache-to: type=registry,ref=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:arm64-cache,mode=max

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Create and Push Manifest
        run: |
          FULL_IMAGE_NAME="${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:latest"
          echo "Creating manifest for $FULL_IMAGE_NAME"
          docker buildx imagetools create -t $FULL_IMAGE_NAME \
            ${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}@${{ needs.build-arm64.outputs.digest }}