# 插件级开关。
[plugin]
# 是否启用插件
# 值类型：bool, 默认值：true
enabled = true

# 是否启用轻量化模式。启用时对外暴露读取/写入两个 Tool, 最小化 LLM 调用, 平均召回时间在3s内；关闭时采用 Agent 模式，对外暴露读取/写入两个 Agent, 执行完整记忆读写工作流。
# 值类型：bool, 默认值：false
enable_lite_mode = false

# 是否将记忆引导语同步到 default_chatter 的 actor system reminder
# 值类型：bool, 默认值：true
inject_system_prompt = true

# 存储层配置。
[storage]
# SQLite 元数据数据库路径
# 值类型：str, 默认值："data/booku_memory/metadata.db"
metadata_db_path = "data/booku_memory/metadata.db"

# 向量数据库路径
# 值类型：str, 默认值："data/chroma_db/booku_memory"
vector_db_path = "data/chroma_db/booku_memory"

# 默认活动记忆文件夹 ID
# 值类型：str, 默认值："default"
default_folder_id = "default"

# 检索与重塑配置。
[retrieval]
# 默认召回条数
# 值类型：int, 默认值：5
default_top_k = 5

# 默认是否检索归档记忆
# 值类型：bool, 默认值：false
include_archived_default = false

# 默认是否检索知识库
# 值类型：bool, 默认值：false
include_knowledge_default = true

# 结果去重余弦阈值
# 值类型：float, 默认值：0.88
deduplication_threshold = 0.88

# 向量重塑基准强度
# 值类型：float, 默认值：0.3
base_beta = 0.3

# 逻辑深度对 beta 的增益系数
# 值类型：float, 默认值：0.5
logic_depth_scale = 0.5

# 核心标签最小增强
# 值类型：float, 默认值：1.2
core_boost_min = 1.2

# 核心标签最大增强
# 值类型：float, 默认值：1.4
core_boost_max = 1.4

# 扩散标签增强权重
# 值类型：float, 默认值：0.3
diffusion_boost = 0.3

# 对立标签惩罚权重
# 值类型：float, 默认值：0.5
opposing_penalty = 0.5

# 写入冲突检测配置。
[write_conflict]
# 写入冲突检查的检索样本数
# 值类型：int, 默认值：8
top_n = 8

# 新颖度能量阈值，低于此值触发合并
# 值类型：float, 默认值：0.1
energy_cutoff = 0.1

# 隐现记忆时间窗口与晋升配置。
[time_window]
# 隐现记忆时间窗口（天）；超出窗口后进入晋升检查
# 值类型：int, 默认值：7
emergent_days = 7

# 隐现记忆在时间窗口内最少激活次数，达到后晋升为归档记忆，否则丢弃
# 值类型：int, 默认值：2
activation_threshold = 2

# Agent 内部 LLM 决策配置。
[internal_llm]
# 内部决策使用的模型任务名
# 值类型：str, 默认值："tool_use"
task_name = "tool_use"

# 内部 tool-calling 最大推理轮数
# 值类型：int, 默认值：12
max_reasoning_steps = 12

# 记忆闪回配置。
# 
# 闪回机制在构建 default_chatter 的 user prompt 时生效：
# - 先按 ``trigger_probability`` 判定是否触发；
# - 触发后按 ``archived_probability`` 判定抽取归档层/隐现层；
# - 在目标层随机抽取一条记忆，激活次数越低越容易被抽到。
[flashback]
# 是否启用记忆闪回机制
# 值类型：bool, 默认值：false
enabled = true

# 每次构建 user prompt 时触发闪回的概率（0~1）
# 值类型：float, 默认值：0.05
trigger_probability = 0.05

# 触发闪回后抽取归档层记忆的概率（0~1）；隐现层概率为 1-该值
# 值类型：float, 默认值：0.6
archived_probability = 0.6

# 限定抽取的 folder_id；为 None 时在所有 folder 中抽取
# 值类型：str | None, 默认值：<必填>
folder_id = ""

# 每次抽取时最多加载的候选记忆数量（按 updated_at 倒序截断）
# 值类型：int, 默认值：50
candidate_limit = 50

# 激活次数权重指数。抽取权重为 1/(activation_count+1)^exponent；指数越大越偏向低激活记忆。
# 值类型：float, 默认值：1.0
activation_weight_exponent = 1.0

# 闪回去重冷却时间（秒）。当某条记忆被触发闪回后，在该时间内不会再次被闪回；设为 0 表示不启用去重。
# 值类型：int, 默认值：3600
cooldown_seconds = 3600

# 文档切分参数配置。
[chunking]
# 单块最大字符数
# 值类型：int, 默认值：900
max_chunk_chars = 900

# 相邻块重叠字符数
# 值类型：int, 默认值：120
overlap_chars = 120

# 启动阶段本地知识库导入配置。（建议仅有未读文档需要导入时启用）
[startup_ingest]
# 是否在启动时自动导入配置路径文档
# 值类型：bool, 默认值：true
enabled = true

# 启动时自动导入的文件或目录路径列表
# 值类型：list, 默认值：["data\\booku_memory\\knowledges"]
paths = ["data/booku_memory/knowledges"]

# 目录路径是否递归扫描子目录
# 值类型：bool, 默认值：true
recursive = true

# 路径不存在时是否跳过并继续
# 值类型：bool, 默认值：true
skip_missing_paths = true

# 文档标题已存在时是否跳过导入
# 值类型：bool, 默认值：true
skip_existing_title = true
