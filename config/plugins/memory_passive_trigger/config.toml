# 被动记忆浮现插件配置

[plugin]
# 是否启用被动记忆浮现插件
enabled = true

[trigger]
# 是否启用被动浮现功能
enabled = true

# 语义匹配阈值（0-1）
# 越高越严格，建议范围 0.70-0.85
similarity_threshold = 0

# 最多浮现几条记忆
max_flash_count = 3

# 冷却时间（秒）- 同一条记忆多久内不能再次浮现
# 设为 0 表示不启用冷却
cooldown_seconds = 10

# 优先触发哪些 folder 的记忆
priority_folders = ["facts", "preferences", "relations"]

[retrieval]
# 是否检索归档层记忆
include_archived = true

# 是否检索知识库
include_knowledge = true

# 检索时最多加载多少候选
candidate_limit = 20

[debug]
# 是否打印详细日志
verbose = false
