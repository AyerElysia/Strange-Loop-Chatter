# 通用配置。
[general]
# 是否启用提示词记录功能
# 值类型：bool, 默认值：true
enabled = true

# 提示词日志文件路径（相对于项目根目录）
# 值类型：str, 默认值："logs/prompt_logger/prompt.log"
log_file = "logs/prompt_logger/prompt.log"

# 单个日志文件的最大大小（MB），超过后自动轮转
# 值类型：int, 默认值：10
max_log_size_mb = 10

# 保留的备份日志文件数量
# 值类型：int, 默认值：5
backup_count = 5

# 日志格式配置。
[format]
# 是否记录 LLM 请求提示词
# 值类型：bool, 默认值：true
show_request = true

# 是否记录 LLM 响应内容
# 值类型：bool, 默认值：true
show_response = true

# 是否在日志中显示工具参数
# 值类型：bool, 默认值：true
show_tools = true

# 是否在日志中显示时间戳
# 值类型：bool, 默认值：true
show_timestamp = true

# 单个 payload 内容的最大截断长度（0 表示不限制）
# 值类型：int, 默认值：0
truncate_content_length = 0

# 日志过滤配置。
[filter]
# 记录范围。dfc_main 仅记录 DFC 主回复模型，custom 按 include/exclude 列表筛选，all 记录所有来源。
# 值类型：Literal, 默认值："dfc_main"
scope = "dfc_main"

# 仅记录这些插件来源（需要堆栈或上下文能识别 plugin_name）
# 值类型：list, 默认值：[]
include_plugins = []

# 仅记录这些 chatter 名称
# 值类型：list, 默认值：[]
include_chatters = []

# 仅记录这些 request_name
# 值类型：list, 默认值：[]
include_request_names = []

# 仅记录这些模型标识
# 值类型：list, 默认值：[]
include_models = []

# 排除这些插件来源
# 值类型：list, 默认值：[]
exclude_plugins = []

# 排除这些 chatter 名称
# 值类型：list, 默认值：[]
exclude_chatters = []

# 排除这些 request_name
# 值类型：list, 默认值：[]
exclude_request_names = []

# 排除这些模型标识
# 值类型：list, 默认值：[]
exclude_models = []

# 是否记录私聊聊天流的提示词
# 值类型：bool, 默认值：true
log_private_chat = true

# 是否记录群聊聊天流的提示词
# 值类型：bool, 默认值：true
log_group_chat = true

# 当无法识别 plugin_name / chatter_name 时，是否仍允许仅凭 request_name 命中记录。
# 值类型：bool, 默认值：true
allow_unknown_source = true
