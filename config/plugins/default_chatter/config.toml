# send_text 分段发送节奏配置。
[plugin.reply]
# 模拟打字速度(字/秒)，小于等于 0 时不添加分段延迟
# 值类型：float, 默认值：15.0
typing_chars_per_sec = 15.0

# 分段发送时的最小段间延迟(秒)
# 值类型：float, 默认值：0.8
typing_delay_min = 0.8

# 分段发送时的最大段间延迟(秒)
# 值类型：float, 默认值：4.0
typing_delay_max = 4.0

# 调试输出相关配置。
[plugin.debug]
# 是否输出发送给 LLM 的完整提示词
# 值类型：bool, 默认值：false
show_prompt = false

# 是否输出 LLM 响应调试摘要
# 值类型：bool, 默认值：false
show_response = false
