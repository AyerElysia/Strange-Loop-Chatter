# 基础设置。
[settings]
# 是否启用 life_engine。设为 false 时不启动心跳。
# 值类型：bool, 默认值：true
enabled = true

# 心跳间隔（秒）。
# 值类型：int, 默认值：30
heartbeat_interval_seconds = 300

# 睡觉时间，格式 HH:MM（24小时制）。与 wake_time 同时配置后生效。
# 值类型：str, 默认值：""
sleep_time = "01:00"

# 苏醒时间，格式 HH:MM（24小时制）。与 sleep_time 同时配置后生效。
# 值类型：str, 默认值：""
wake_time = "07:30"

# 是否在每次心跳时输出日志。
# 值类型：bool, 默认值：true
log_heartbeat = true

# 滚动事件流最多保留的事件条数（包括心跳、消息、工具调用等）。
# 值类型：int, 默认值：100
context_history_max_events = 100

# 中枢文件系统操作的工作空间路径。中枢只能在此目录下进行文件操作。
# 值类型：str, 默认值："/root/Elysia/Neo-MoFox/data/life_engine_workspace"
workspace_path = "/root/Elysia/Neo-MoFox/data/life_engine_workspace"

# 单次心跳内允许模型连续进行工具调用的最大轮数（防止死循环）。
# 值类型：int, 默认值：3
max_rounds_per_heartbeat = 8

# 中枢模型任务设置。
[model]
# 中枢任务使用的模型任务名称，对应 config/model.toml 中的 [model_tasks.life]。
# 值类型：str, 默认值："life"
task_name = "life"
