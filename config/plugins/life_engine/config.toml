# 基础设置。
[settings]
# 是否启用 life_engine。设为 false 时不启动心跳。
# 值类型：bool, 默认值：true
enabled = true

# 心跳间隔（秒）。
# 值类型：int, 默认值：30
heartbeat_interval_seconds = 300

# 睡觉时间，格式 HH:MM（24小时制）。与 wake_time 同时配置后生效。
# 值类型：str, 默认值：""
sleep_time = ""

# 苏醒时间，格式 HH:MM（24小时制）。与 sleep_time 同时配置后生效。
# 值类型：str, 默认值：""
wake_time = ""

# 是否在每次心跳时输出日志。
# 值类型：bool, 默认值：true
log_heartbeat = true

# 滚动事件流最多保留的事件条数（包括心跳、消息、工具调用等）。
# 值类型：int, 默认值：100
context_history_max_events = 300

# 中枢文件系统操作的工作空间路径。中枢只能在此目录下进行文件操作。
# 值类型：str, 默认值："/root/Elysia/Neo-MoFox/plugins/data/life_engine_workspace"
workspace_path = "/root/Elysia/Neo-MoFox/data/life_engine_workspace"

# 单次心跳内允许模型连续进行工具调用的最大轮数（防止死循环）。
# 值类型：int, 默认值：3
max_rounds_per_heartbeat = 10

# 中枢模型任务设置。
[model]
# 中枢任务使用的模型任务名称，对应 config/model.toml 中的 [model_tasks.life]。
# 值类型：str, 默认值："life"
task_name = "life"

# 网络搜索与网页提取能力配置（Tavily）。
[web]
# Tavily API Key。请在 config/plugins/life_engine/config.toml 的 [web] 中配置。
# 值类型：str, 默认值：""
tavily_api_key = "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"

# 多个 Tavily API Key。配置后 web_tools 会按轮询方式选择，用于负载均衡。
# 值类型：list, 默认值：[]
tavily_api_keys = ["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", "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"]

# Tavily API 基础地址。
# 值类型：str, 默认值："https://api.tavily.com"
tavily_base_url = "https://api.tavily.com"

# 多个 Tavily API 基础地址。配置后 web_tools 会按轮询方式选择，用于负载均衡。
# 值类型：list, 默认值：[]
tavily_base_urls = []

# 网络搜索超时（秒）。
# 值类型：int, 默认值：30
search_timeout_seconds = 30

# 网页提取超时（秒）。
# 值类型：int, 默认值：60
extract_timeout_seconds = 60

# 网络搜索默认返回条数。
# 值类型：int, 默认值：5
default_search_max_results = 5

# 网页提取默认最大返回字符数。
# 值类型：int, 默认值：12000
default_fetch_max_chars = 12000

# 统一对话器配置。
[chatter]
# 启用后 life_engine 直接处理对话，替代 DFC + bridge 架构。
# 值类型：bool, 默认值：false
enabled = false

# 执行模式: enhanced / classical
# 值类型：str, 默认值："enhanced"
mode = "enhanced"

# 对话模式单轮最大工具调用轮数。
# 值类型：int, 默认值：5
max_rounds_per_chat = 5

# SNN 皮层下状态层配置。
[snn]
# 是否启用 SNN 状态层。启用后 life_engine 将运行一个持续的 SNN 驱动核。
# 值类型：bool, 默认值：false
enabled = true

# 影子模式：只记录 SNN 状态变化，不注入心跳 prompt。用于初期验证。
# 值类型：bool, 默认值：true
shadow_only = false

# SNN 独立 tick 间隔（秒）。SNN 以此频率独立更新衰减，不绑定 LLM 心跳。
# 值类型：float, 默认值：10.0
tick_interval_seconds = 10.0

# 是否将 SNN 驱动状态注入心跳 prompt。需要 shadow_only=false 才生效。
# 值类型：bool, 默认值：false
inject_to_heartbeat = true

# 特征提取窗口大小（秒）。决定 SNN 从多长时间的事件中提取输入。
# 值类型：float, 默认值：600.0
feature_window_seconds = 600.0

# 神经调质层配置。
[neuromod]
# 是否启用神经调质层。调质层在 SNN 之上提供慢时间尺度的驱动调节。
# 值类型：bool, 默认值：true
enabled = true

# 是否将调质状态注入心跳 prompt。
# 值类型：bool, 默认值：true
inject_to_heartbeat = true

# 是否启用习惯追踪。
# 值类型：bool, 默认值：true
habit_tracking = true

# 做梦系统配置。三阶段做梦周期：NREM 回放 → REM 联想 → 觉醒过渡。
[dream]
# 是否启用做梦系统。
# 值类型：bool, 默认值：true
enabled = true

# 每次做梦 NREM 阶段回放的事件集数。
# 值类型：int, 默认值：3
nrem_replay_episodes = 3

# 每集回放包含的事件数量。
# 值类型：int, 默认值：20
nrem_events_per_episode = 20

# NREM 回放加速倍率（缩短 SNN tau）。
# 值类型：float, 默认值：5.0
nrem_speed_multiplier = 5.0

# SHY 突触稳态缩减比例（每次做梦全局权重缩减百分比）。
# 值类型：float, 默认值：0.02
nrem_homeostatic_rate = 0.02

# REM 阶段记忆图谱随机游走轮数。
# 值类型：int, 默认值：2
rem_walk_rounds = 2

# 每轮 REM 游走的随机种子数。
# 值类型：int, 默认值：5
rem_seeds_per_round = 5

# REM 游走激活扩散最大深度。
# 值类型：int, 默认值：3
rem_max_depth = 3

# REM 游走激活扩散衰减因子。
# 值类型：float, 默认值：0.6
rem_decay_factor = 0.6

# REM 阶段 Hebbian 学习率（低于清醒时 0.1）。
# 值类型：float, 默认值：0.05
rem_learning_rate = 0.05

# REM 阶段弱边修剪阈值（仅 ASSOCIATES 边）。
# 值类型：float, 默认值：0.08
rem_edge_prune_threshold = 0.08

# 两次做梦之间的最小间隔（分钟）。
# 值类型：int, 默认值：90
dream_interval_minutes = 90

# 白天连续空闲心跳数触发小憩做梦。
# 值类型：int, 默认值：10
idle_trigger_heartbeats = 10

# 是否启用白天小憩做梦（空闲触发）。
# 值类型：bool, 默认值：true
nap_enabled = true

# 统一对话器配置。
[chatter]
# 启用后 life_engine 直接处理对话，替代 DFC + bridge 架构。
# 值类型：bool, 默认值：false
enabled = false

# 执行模式: enhanced / classical
# 值类型：str, 默认值："enhanced"
mode = "enhanced"

# 对话模式单轮最大工具调用轮数。
# 值类型：int, 默认值：5
max_rounds_per_chat = 5
