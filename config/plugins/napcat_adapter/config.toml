# 插件基本配置
[plugin]
# 是否启用 Napcat 适配器
# 值类型：bool, 默认值：true
enabled = true

# 配置文件版本
# 值类型：str, 默认值："2.0.0"
config_version = "2.0.0"

# Bot 基本配置
[bot]
# Bot 的 QQ 账号 ID
# 值类型：str, 默认值：<必填>
qq_id = "3427056465"

# Bot 的 QQ 昵称
# 值类型：str, 默认值：<必填>
qq_nickname = "爱莉希雅"

# Napcat WebSocket 服务器配置
[napcat_server]
# ws 连接模式: reverse/direct
# 值类型：str, 默认值："reverse"
mode = "reverse"

# Napcat WebSocket 服务地址
# 值类型：str, 默认值："localhost"
host = "localhost"

# Napcat WebSocket 服务端口
# 值类型：int, 默认值：8095
port = 8087

# Napcat API 访问令牌（可选）
# 值类型：str, 默认值：""
access_token = ""

# 功能特性配置
[features]
# 群聊名单模式: blacklist/whitelist
# 值类型：str, 默认值："blacklist"
group_list_type = "blacklist"

# 群聊名单；根据名单模式过滤
# 值类型：list, 默认值：[]
group_list = []

# 私聊名单模式: blacklist/whitelist
# 值类型：str, 默认值："blacklist"
private_list_type = "blacklist"

# 私聊名单；根据名单模式过滤
# 值类型：list, 默认值：[]
private_list = []

# 全局封禁的用户 ID 列表
# 值类型：list, 默认值：[]
ban_user_id = []

# 是否启用戳一戳消息处理
# 值类型：bool, 默认值：true
enable_poke = true

# 是否忽略不是针对自己的戳一戳消息
# 值类型：bool, 默认值：false
ignore_non_self_poke = false

# 戳一戳防抖时间（秒）
# 值类型：float, 默认值：2.0
poke_debounce_seconds = 2.0

# 是否启用群聊表情回复处理
# 值类型：bool, 默认值：true
enable_emoji_like = true

# 是否在回复时自动@原消息发送者
# 值类型：bool, 默认值：true
enable_reply_at = true

# 回复时@的概率（0.0-1.0）
# 值类型：float, 默认值：0.5
reply_at_rate = 1.0

# 是否启用视频消息处理（下载和解析）
# 值类型：bool, 默认值：true
enable_video_processing = true

# 允许下载的视频文件最大大小（MB）
# 值类型：int, 默认值：100
video_max_size_mb = 100

# 视频下载超时时间（秒）
# 值类型：int, 默认值：60
video_download_timeout = 60
