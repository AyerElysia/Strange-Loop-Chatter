# 基础设置配置项。
[settings]
# 是否启用时间感知。设为 false 可临时禁用，无需从 core.toml 移除插件。
# 值类型：bool, 默认值：true
enabled = false

# 是否在插件加载时自动注入时间提醒。
# 值类型：bool, 默认值：true
inject_on_load = false

# 是否启用自动刷新（每小时更新一次时间）。
# 值类型：bool, 默认值：false
auto_refresh = false

# 时间格式配置项。
[format]
# 是否使用中式时辰（子丑寅卯等）。
# 值类型：bool, 默认值：true
use_chinese_shichen = false

# 是否显示生肖年份。
# 值类型：bool, 默认值：true
use_zodiac = true

# 是否显示刻（每 15 分钟为一刻）。
# 值类型：bool, 默认值：true
use_ke = true

# 自定义时间格式模板（空则使用默认中式格式）。
# 值类型：str, 默认值：""
custom_format = ""
