# Prompt Logger 插件配置文件
# 用于配置提示词记录行为

[general]
# 是否启用提示词记录功能
enabled = true

# 提示词日志文件路径（相对于项目根目录）
log_file = "logs/prompt_logger/prompt.log"

# 单个日志文件的最大大小（MB），超过后自动轮转
max_log_size_mb = 10

# 保留的备份日志文件数量
backup_count = 5

[format]
# 是否记录 LLM 请求提示词
show_request = true

# 是否记录 LLM 响应内容
show_response = true

# 是否在日志中显示工具参数
show_tools = true

# 是否在日志中显示时间戳
show_timestamp = true

# 单个 payload 内容的最大截断长度（0 表示不限制）
truncate_content_length = 0

[filter]
# 记录范围：dfc_main / custom / all
scope = "dfc_main"

# 仅记录这些插件来源（需要能解析出 plugin_name）
include_plugins = []

# 仅记录这些 chatter 名称
include_chatters = []

# 仅记录这些 request_name
include_request_names = []

# 仅记录这些模型标识
include_models = []

# 排除这些插件来源
exclude_plugins = []

# 排除这些 chatter 名称
exclude_chatters = []

# 排除这些 request_name
exclude_request_names = []

# 排除这些模型标识
exclude_models = []

# 是否记录私聊聊天流的提示词
log_private_chat = true

# 是否记录群聊聊天流的提示词
log_group_chat = true

# 当无法识别 plugin/chatter 时，是否仍允许仅凭 request_name 命中记录
allow_unknown_source = true
