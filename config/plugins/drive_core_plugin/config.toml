# 插件基础配置。
[plugin]
# 是否启用 drive_core_plugin
# 值类型：bool, 默认值：true
enabled = true

# 是否在 prompt 构建时注入内驱力状态
# 值类型：bool, 默认值：true
inject_prompt = true

# 是否复用 default_chatter 的完整系统人设提示词
# 值类型：bool, 默认值：true
inherit_default_chatter_persona_prompt = true

# 持久化配置。
[storage]
# 内驱力状态存储根目录
# 值类型：str, 默认值："data/drive_core"
base_path = "data/drive_core"

# 保留的历史任务记录上限
# 值类型：int, 默认值：20
max_history_records = 20

# prompt 中最多展示的证据摘要条数
# 值类型：int, 默认值：3
max_prompt_evidence_lines = 3

# 推进配置。
[scan]
# 每隔多少次有效对话触发一次内驱力推进
# 值类型：int, 默认值：6
trigger_every_n_messages = 6

# 推进时给模型看的最近历史条数
# 值类型：int, 默认值：12
history_window_size = 12

# 单个自我课题允许推进的最大轮次
# 值类型：int, 默认值：4
max_inquiry_steps = 4

# prompt 注入配置。
[prompt]
# 允许注入内驱力块的 prompt 模板名
# 值类型：list, 默认值：["default_chatter_system_prompt"]
target_prompt_names = ["default_chatter_system_prompt"]

# prompt 中显示的标题
# 值类型：str, 默认值："内驱力"
prompt_title = "内驱力"

# 是否在 prompt 中显示证据摘要
# 值类型：bool, 默认值：false
inject_evidence = false

# 模型配置。
[model]
# 内驱力推进使用的模型任务名
# 值类型：str, 默认值："diary"
task_name = "diary"

# 当主任务不可用时的回退任务名
# 值类型：str, 默认值："actor"
fallback_task_name = "actor"

# 内驱力底噪配置。
[drive]
# 好奇
# 值类型：int, 默认值：62
curiosity = 62

# 行动欲
# 值类型：int, 默认值：50
initiative = 50

# 靠近倾向
# 值类型：int, 默认值：45
affinity = 45

# 收缩倾向
# 值类型：int, 默认值：28
withdrawal = 28

# 疲惫
# 值类型：int, 默认值：22
fatigue = 22

# 紧迫感
# 值类型：int, 默认值：35
urgency = 35

# 稳定感
# 值类型：int, 默认值：58
stability = 58
