# 社交类意图配置。
[social]
# 是否启用社交类意图（了解用户、开启话题、记住细节等）
# 值类型：bool, 默认值：true
enabled = true【

# 社交类意图的权重（0-1，影响生成概率）
# 值类型：float, 默认值：1.0
weight = 1.0

# 情感类意图配置。
[emotional]
# 是否启用情感类意图（情感支持、制造惊喜、表达共情等）
# 值类型：bool, 默认值：true
enabled = true

# 情感类意图的权重（0-1，影响生成概率）
# 值类型：float, 默认值：1.0
weight = 1.0

# 成长类意图配置。
[growth]
# 是否启用成长类意图（学习喜好、构建回忆、知识分享等）
# 值类型：bool, 默认值：true
enabled = true

# 成长类意图的权重（0-1，影响生成概率）
# 值类型：float, 默认值：1.0
weight = 1.0

# LLM 意图生成配置。
[generation]
# 用于意图生成的 LLM 模型任务名称
# 值类型：str, 默认值："actor"
model_task = "actor"

# 每次最多生成的意图候选数量
# 值类型：int, 默认值：3
max_candidates = 2

# 生成多样性温度（0-1，越高越多样化）
# 值类型：float, 默认值：0.7
diversity_temperature = 0.7

# 意图生成间隔（每 N 条消息触发一次意图生成）
# 值类型：int, 默认值：3
intent_generation_interval = 7

# 全局设置配置。
[settings]
# 最多同时活跃的意图数量
# 值类型：int, 默认值：3
max_active_intents = 3

# 意图优先级阈值（低于此值不触发）
# 值类型：int, 默认值：3
min_priority_threshold = 3

# 目标超时配置（多少条消息后超时）
# 值类型：int, 默认值：20
goal_timeout_messages = 20

# 目标超时配置（多少秒后超时）
# 值类型：int, 默认值：600
goal_timeout_seconds = 600

# 同一意图两次触发之间的最小间隔（消息数）
# 值类型：int, 默认值：15
intent_cooldown_messages = 15

# System Reminder 配置。
[reminder]
# 是否显示当前目标
# 值类型：bool, 默认值：true
show_current_goal = true

# 是否显示进度提示
# 值类型：bool, 默认值：true
show_progress_hint = true

# 语气风格 (natural/cute/professional)
# 值类型：str, 默认值："natural"
tone_style = "natural"
