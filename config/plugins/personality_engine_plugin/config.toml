# 插件基础配置。
[plugin]
# 是否启用 personality_engine_plugin
# 值类型：bool, 默认值：true
enabled = true

# 是否在 prompt 构建时注入人格态摘要
# 值类型：bool, 默认值：true
inject_prompt = true

# 存储配置。
[storage]
# 人格状态存储根目录
# 值类型：str, 默认值："data/personality_engine"
base_path = "data/personality_engine"

# 每个聊天流最大保留的变更历史条数
# 值类型：int, 默认值：30
max_history_records = 30

# 扫描与推进配置。
[scan]
# 每隔多少次有效对话触发一次人格推进
# 值类型：int, 默认值：6
trigger_every_n_messages = 6

# 人格推进读取的最近消息条数
# 值类型：int, 默认值：12
max_context_messages = 12

# 模型配置。
[model]
# 人格推进使用的模型任务名
# 值类型：str, 默认值："diary"
task_name = "diary"

# 主任务不可用时的回退任务名
# 值类型：str, 默认值："actor"
fallback_task_name = "actor"

# 是否启用 LLM 选择当前补偿功能
# 值类型：bool, 默认值：true
enable_llm_selector = true

# 是否启用 LLM 执行结构反思判定
# 值类型：bool, 默认值：true
enable_llm_reflection = true

# 人格更新配置。
[personality]
# 默认人格类型（16MBTI）
# 值类型：str, 默认值："INTJ"
default_mbti = "ENFP"

# 每轮对选中功能的权重增量
# 值类型：float, 默认值：0.06
change_weight = 0.06

# 未触发人格结构变更时的变更历史衰减系数
# 值类型：float, 默认值：0.2
change_history_decay = 0.2

# 主功能临时权重超过该阈值时触发归一化
# 值类型：float, 默认值：0.5
normalize_main_threshold = 0.5

# LLM 输出解析失败时的最大重试次数
# 值类型：int, 默认值：2
max_parse_retries = 2

# prompt 注入配置。
[prompt]
# 允许注入人格态摘要的 prompt 模板名
# 值类型：list, 默认值：["default_chatter_system_prompt"]
target_prompt_names = ["default_chatter_system_prompt"]

# 注入块标题
# 值类型：str, 默认值："人格态"
prompt_title = "人格态"

# 注入模式，可选 compact/paper_strict
# 值类型：str, 默认值："paper_strict"
mode = "paper_strict"

# 注入粒度，可选 compact/detail
# 值类型：str, 默认值："detail"
inject_detail_level = "detail"

# paper_strict 模式下是否注入八功能映射说明
# 值类型：bool, 默认值：true
include_function_catalog = true

# paper_strict 模式下注入的近期结构变化记录条数
# 值类型：int, 默认值：3
recent_history_records = 3
