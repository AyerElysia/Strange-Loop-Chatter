# 调度相关配置。
[scheduler]
# 入库任务执行间隔（秒）
# 值类型：int, 默认值：120
interval_seconds = 120

# 插件行为配置。
[plugin]
# 是否将表情包使用提示同步到 default_chatter 的 actor system reminder
# 值类型：bool, 默认值：true
inject_system_prompt = true

# 自定义提示词配置。
[prompt]
# 追加到 send_emoji_meme action 描述末备的自定义指令。
# 可描述希望 AI 主动使用表情包的具体场景，例如：在表达强烈情感、开玩笑或缓解尴尬时主动使用。
# 不会覆盖已有的触发条件，只是扩充场景说明。
# 值类型：str, 默认值：""
custom_instructions = ""

# 入库相关配置。
[ingest]
# 手动放置表情包的目录（用法：关闭随机抽取，手动放表情包到此目录）
# 值类型：str, 默认值："data/emoji_sender/manual_memes"
manual_memes_dir = "data/emoji_sender/manual_memes"

# 是否从 data/media_cache/emojis 随机抽取候选表情包（关闭则使用手动目录，需要手动放置表情包）
# 值类型：bool, 默认值：true
sample_from_media_cache = true

# 向量库相关配置。
[vector]
# 向量集合名
# 值类型：str, 默认值："emoji_sender"
collection_name = "emoji_sender"

# 向量数据库路径（ChromaDB）
# 值类型：str, 默认值："data/emoji_sender/vector_db"
db_path = "data/emoji_sender/vector_db"

# 检索候选数量 topN
# 值类型：int, 默认值：8
top_n = 16

# 最大距离阈值（距离越小越相似）
# 值类型：float, 默认值：0.35
max_distance = 0.35

# 检索结果采样温度（<=0 时固定选择最相似项，越大越随机）
# 值类型：float, 默认值：0.3
temperature = 0.3

# 文件存储相关配置。
[storage]
# 插件表情包复制文件目录
# 值类型：str, 默认值："data/emoji_sender/memes"
data_dir = "data/emoji_sender/memes"

# 最大可用表情包数量上限（<=0 表示不限制）；达到上限后不再继续入库
# 值类型：int, 默认值：200
max_memes = 200
