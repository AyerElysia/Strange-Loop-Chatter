# 基础配置。
[general]
# 是否启用
# 值类型：bool, 默认值：true
enabled = true【

# LLM 模型任务名称（对应 model.toml 中的 task）
# 值类型：str, 默认值："actor"
model_task = "actor"

# 自定义 LLM 模型名称（对应 model.toml 中的 name）。默认为空，使用 model_task。
# 值类型：str, 默认值：""
model = ""

# 原生多模态模式。启用后，图片直接打包进 LLM payload，由主模型在对话上下文中理解图片内容并做出响应。需确保 model_task 配置的模型支持多模态输入。
# 值类型：bool, 默认值：false
native_multimodal = true

# 原生多模态模式下的总图片配额（整个 payload 中所有来源的图片上限）。配额由 bot 已发图片、用户新消息图片、历史图片三者共同占用，优先级依次为：bot 已发 > 用户新消息 > 历史补充。例如设为 4 时，若 bot 最近发了 1 张、用户本轮发了 2 张，则历史图片最多补 1 张。
# 值类型：int, 默认值：4
max_images_per_payload = 4

# tool_call_compat 解析失败时的最大重试次数。当模型输出纯自然语言而非 JSON 格式时，注入格式提醒后重试。0 表示不重试。
# 值类型：int, 默认值：1
max_compat_retries = 1

# 自定义决策提示词。用于指导 KFC 的决策行为，会被注入到系统提示词的安全准则之后。留空则不生效。
# 值类型：str, 默认值：""
custom_decision_prompt = ""

# 需要从工具列表中屏蔽的工具末段名称（不含组件类型前缀）。列表中的工具不会暴露给 LLM。
# 值类型：list, 默认值：["send_text", "pass_and_wait", "stop_conversation"]
blocked_tools = ["send_text", "action-send_text", "pass_and_wait", "stop_conversation"]

# 等待机制配置。
[wait]
# 最小等待秒数
# 值类型：float, 默认值：10.0
min_seconds = 10.0

# 最大等待秒数
# 值类型：float, 默认值：600.0
max_seconds = 600.0

# 连续超时上限，达到后不再等待
# 值类型：int, 默认值：3
max_consecutive_timeouts = 3

# 主动发起配置。
[proactive]
# 是否启用主动发起
# 值类型：bool, 默认值：true
enabled = true

# 沉默阈值(秒)，超过后可能主动发起
# 值类型：int, 默认值：7200
silence_threshold = 7200

# 主动发起触发概率
# 值类型：float, 默认值：0.3
trigger_probability = 0.3

# 两次主动发起最小间隔(秒)
# 值类型：int, 默认值：1800
min_interval = 1800

# 勿扰开始时间
# 值类型：str, 默认值："23:00"
quiet_hours_start = "23:00"

# 勿扰结束时间
# 值类型：str, 默认值："07:00"
quiet_hours_end = "07:00"

# 主动发起检查间隔(秒)
# 值类型：int, 默认值：60
check_interval = 60

# 回复配置。
[reply]
# 模拟打字速度(字/秒)
# 值类型：float, 默认值：15.0
typing_chars_per_sec = 15.0

# 最小打字延迟(秒)
# 值类型：float, 默认值：0.8
typing_delay_min = 0.8

# 最大打字延迟(秒)
# 值类型：float, 默认值：4.0
typing_delay_max = 4.0

# 提示词配置。
[prompt]
# 最大活动流条目数
# 值类型：int, 默认值：50
max_log_entries = 50

# LLM 上下文最大 payload 数量
# 值类型：int, 默认值：20
max_context_payloads = 20

# 历史热启动轮次数（每轮 = 一次 bot 回复及其前的用户消息）。在 execute() 重启时，从历史末尾取最近 N 轮重建为真实 USER/ASSISTANT payload，让模型以第一人称延续对话情绪。这些 payload 位于上下文最前端，当真实对话积累超过 max_context_payloads 上限时，它们会被优先裁剪（已完成使命），最新的真实对话始终保留在末尾。设为 0 则禁用热启动。
# 值类型：int, 默认值：3
warmup_rounds = 3

# 连续思考配置。
[continuous_thinking]
# 是否启用连续思考
# 值类型：bool, 默认值：true
enabled = true

# 等待进度触发阈值列表
# 值类型：list, 默认值：[0.3, 0.6, 0.85]
progress_thresholds = [0.3, 0.6, 0.85]

# 两次连续思考最小间隔(秒)
# 值类型：float, 默认值：30.0
min_interval = 30.0

# 调试配置。
[debug]
# 是否在日志中显示发送给 LLM 的完整提示词
# 值类型：bool, 默认值：false
show_prompt = true

# 是否在日志中显示 LLM 响应的美化摘要
# 值类型：bool, 默认值：true
show_response = false
