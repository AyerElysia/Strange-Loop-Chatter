# 配置节基类。
# 
# 配置节是一组相关的配置选项。它们会被 ConfigBase 自动收集并映射到 TOML 节。
[general]
# 是否启用 sleep_wakeup_plugin
# 值类型：bool, 默认值：true
enabled = true【

# 是否输出调试日志
# 值类型：bool, 默认值：false
debug_mode = false

# 配置节基类。
# 
# 配置节是一组相关的配置选项。它们会被 ConfigBase 自动收集并映射到 TOML 节。
[timing]
# 预计入睡时间点（HH:MM）
# 值类型：str, 默认值："23:30"
sleep_target_time = "23:30"

# 预计苏醒时间点（HH:MM）
# 值类型：str, 默认值："07:30"
wake_target_time = "07:30"

# 入睡窗口（分钟）
# 值类型：int, 默认值：90
sleep_window_minutes = 90

# 苏醒窗口（分钟）
# 值类型：int, 默认值：120
wake_window_minutes = 120

# 困倦值更新周期（秒）
# 值类型：int, 默认值：30
update_interval_seconds = 30

# 配置节基类。
# 
# 配置节是一组相关的配置选项。它们会被 ConfigBase 自动收集并映射到 TOML 节。
[model]
# 守护决策使用的模型任务名
# 值类型：str, 默认值："actor"
guardian_model_task = "actor"

# 守护决策调用大模型的超时时间（秒）
# 值类型：int, 默认值：20
guardian_timeout_seconds = 20

# 预计入睡阶段每次更新增加的困倦值
# 值类型：int, 默认值：2
pre_sleep_step = 2

# 预计睡眠阶段每次更新增加的困倦值
# 值类型：int, 默认值：6
sleep_phase_step = 6

# 预计苏醒阶段每次更新降低的困倦值
# 值类型：int, 默认值：3
pre_wake_step = 3

# 守护驳回苏醒时重置的困倦值
# 值类型：int, 默认值：10
lie_in_reset_drowsiness = 10

# 守护驳回最大次数，超过后强制批准苏醒
# 值类型：int, 默认值：1
max_lie_in_attempts = 1

# 配置节基类。
# 
# 配置节是一组相关的配置选项。它们会被 ConfigBase 自动收集并映射到 TOML 节。
[guard]
# 角色处于 sleeping 时是否阻挡消息事件
# 值类型：bool, 默认值：true
block_messages_when_sleeping = false

# 检测到私聊消息时是否降低困倦值
# 值类型：bool, 默认值：true
enable_private_message_wakeup = true

# 每次检测到私聊消息时降低的困倦值
# 值类型：int, 默认值：12
private_message_wakeup_delta = 12

# 私聊唤醒用户名单模式
# 值类型：str, 默认值："all"
wakeup_user_list_type = "all"

# 私聊唤醒用户列表（格式：platform:user_id）
# 值类型：list, 默认值：[]
wakeup_user_list = []

# 配置节基类。
# 
# 配置节是一组相关的配置选项。它们会被 ConfigBase 自动收集并映射到 TOML 节。
[storage]
# JSON 存储键名
# 值类型：str, 默认值："runtime_state"
state_key = "runtime_state"

# 保留的最大历史记录数量
# 值类型：int, 默认值：500
max_history_records = 500
