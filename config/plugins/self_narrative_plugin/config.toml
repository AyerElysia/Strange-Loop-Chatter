# 插件基础配置。
[plugin]
# 是否启用 self_narrative_plugin
# 值类型：bool, 默认值：true
enabled = true

# 是否在 prompt 构建时注入自我叙事摘要
# 值类型：bool, 默认值：true
inject_prompt = true

# 是否在 prompt 中显示稳定边界
# 值类型：bool, 默认值：true
include_identity_bounds_in_prompt = true

# 是否在 prompt 中显示近期演化历史
# 值类型：bool, 默认值：false
include_history_in_prompt = false

# 持久化配置。
[storage]
# 自我叙事存储根目录
# 值类型：str, 默认值："data/self_narratives"
base_path = "data/self_narratives"

# 保留的历史演化记录上限
# 值类型：int, 默认值：12
max_history_records = 12

# prompt 中每个分区展示的最大条目数
# 值类型：int, 默认值：3
max_prompt_items_per_section = 3

# 调度配置。
[schedule]
# 是否启用每日 0 点自动更新
# 值类型：bool, 默认值：true
enabled = true

# 每日自动更新触发时间（HH:MM）
# 值类型：str, 默认值："00:00"
update_time = "00:00"

# 启动时是否补跑一次未执行的日更
# 值类型：bool, 默认值：true
catch_up_on_startup = true

# 手动命令更新冷却时间（秒）
# 值类型：int, 默认值：300
manual_cooldown_seconds = 300

# prompt 注入配置。
[prompt]
# 允许注入自我叙事的 prompt 模板名
# 值类型：list, 默认值：["default_chatter_system_prompt"]
target_prompt_names = ["default_chatter_system_prompt"]

# prompt 中显示的标题
# 值类型：str, 默认值："自我叙事"
prompt_title = "自我叙事"

# prompt 中展示的历史演化记录条数
# 值类型：int, 默认值：3
max_history_lines = 3

# 模型配置。
[model]
# 自我叙事更新使用的模型任务名
# 值类型：str, 默认值："diary"
task_name = "diary"

# 当主任务不可用时的回退模型任务名
# 值类型：str, 默认值："actor"
fallback_task_name = "actor"

# 自我叙事默认值。
[narrative]
# 初始稳定边界
# 值类型：list, 默认值：["我更重视真实表达，而不是迎合", "我倾向先理解再判断", "我不希望自己变得过度机械"]
default_identity_bounds = ["我更重视真实表达，而不是迎合", "我倾向先理解再判断", "我不希望自己变得过度机械"]

# 初始自我理解
# 值类型：list, 默认值：[]
default_self_view = []

# 初始反复模式
# 值类型：list, 默认值：[]
default_ongoing_patterns = []

# 初始开放问题
# 值类型：list, 默认值：[]
default_open_loops = []
