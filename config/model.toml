# 值类型：str, 默认值：<必填>
model_identifier = "Qwen/Qwen3-14B"

# 模型名称（用于内部调用）
# 值类型：str, 默认值：<必填>
name = "qwen3-14b"

# 所属 API 提供商名称
# 值类型：str, 默认值：<必填>
api_provider = "SiliconFlow"

# 每百万 token 输入价格
# 值类型：float, 默认值：0.0
price_in = 0.5

# 每百万 token 输出价格
# 值类型：float, 默认值：0.0
price_out = 2.0

# 是否强制使用流式输出模式
# 值类型：bool, 默认值：false
force_stream_mode = false

# 模型最大输入上下文 token 数
# 值类型：int, 默认值：32768
max_context = 32768

# 是否启用 Tool Call 兼容模式（模型不支持原生工具调用时使用）
# 值类型：bool, 默认值：false
tool_call_compat = false

# 额外参数（用于 API 调用时的额外配置）
# 值类型：dict, 默认值：{  }
extra_params = { enable_thinking = false }

# 是否启用反截断功能
# 值类型：bool, 默认值：false
anti_truncation = false

