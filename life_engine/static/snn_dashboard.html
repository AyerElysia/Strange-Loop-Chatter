<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱莉希雅 · 内在状态仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --border: #2a2a4a;
  --text: #e0e0f0;
  --text-dim: #8888aa;
  --pink: #ff6b9d;
  --pink-dim: #cc5580;
  --cyan: #4ecdc4;
  --purple: #a855f7;
  --orange: #f97316;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --yellow: #eab308;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  text-align: center;
  padding: 24px 16px 12px;
  background: linear-gradient(135deg, #1a0a2e 0%, #0f0f1a 50%, #0a1a1a 100%);
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 1.6em;
  background: linear-gradient(90deg, var(--pink), var(--purple), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  color: var(--text-dim);
  font-size: 0.85em;
  margin-top: 4px;
}
.status-bar {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 8px;
  background: rgba(26,26,46,0.8);
  border-bottom: 1px solid var(--border);
  font-size: 0.8em;
}
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-active { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot-inactive { background: var(--red); }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
  max-width: 1600px;
  margin: 0 auto;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  transition: border-color 0.3s;
}
.card:hover { border-color: var(--pink-dim); }
.card-title {
  font-size: 0.95em;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon { font-size: 1.1em; }
.full-width { grid-column: 1 / -1; }

/* Drive bars */
.drive-bar-container { margin: 6px 0; }
.drive-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8em;
  margin-bottom: 3px;
}
.drive-bar {
  height: 20px;
  background: #222244;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.drive-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.8s ease, background 0.8s ease;
  position: relative;
}
.drive-fill::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 3px;
  height: 100%;
  background: rgba(255,255,255,0.3);
  border-radius: 0 10px 10px 0;
}

/* Modulator display */
.mod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.mod-item {
  text-align: center;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  border: 1px solid transparent;
  transition: all 0.3s;
}
.mod-item:hover { border-color: var(--pink-dim); }
.mod-value {
  font-size: 1.6em;
  font-weight: 700;
  background: linear-gradient(135deg, var(--pink), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.mod-name { font-size: 0.75em; color: var(--text-dim); margin-top: 2px; }
.mod-level { font-size: 0.7em; margin-top: 4px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
.level-充盈 { background: rgba(34,197,94,0.2); color: var(--green); }
.level-适中 { background: rgba(59,130,246,0.2); color: var(--blue); }
.level-偏低 { background: rgba(234,179,8,0.2); color: var(--yellow); }
.level-匮乏 { background: rgba(239,68,68,0.2); color: var(--red); }

/* Habit display */
.habit-list { display: flex; flex-wrap: wrap; gap: 8px; }
.habit-tag {
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 0.8em;
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.3);
  color: var(--purple);
}
.habit-tag.strong { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: var(--green); }
.habit-tag.forming { background: rgba(234,179,8,0.15); border-color: rgba(234,179,8,0.3); color: var(--yellow); }

/* Neuron visualization */
.neuron-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.neuron {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
}
.neuron.spike {
  box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
  border-color: var(--cyan);
}

/* Chart containers */
.chart-container { position: relative; height: 180px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-item { text-align: center; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; }
.stat-value { font-size: 1.2em; font-weight: 600; color: var(--cyan); }
.stat-label { font-size: 0.7em; color: var(--text-dim); }

/* Weight heatmap */
.heatmap-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
.heatmap { display: inline-block; }
.heatmap-title { font-size: 0.75em; color: var(--text-dim); text-align: center; margin-bottom: 4px; }
canvas.heatmap-canvas { border-radius: 4px; image-rendering: pixelated; }

/* Circadian */
.circadian-info { display: flex; gap: 16px; align-items: center; justify-content: center; }
.circadian-clock {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid var(--border);
  position: relative;
  background: radial-gradient(circle, rgba(78,205,196,0.1) 0%, transparent 70%);
}
.clock-hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
  background: var(--cyan);
  border-radius: 2px;
}
.clock-hour { width: 3px; height: 22px; }
.clock-minute { width: 2px; height: 30px; opacity: 0.6; }

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>✧ 爱莉希雅 · 内在状态仪表盘 ✧</h1>
  <div class="subtitle">SNN 脉冲层 + 神经调质层 + 习惯追踪 + 昼夜节律</div>
</div>

<div class="status-bar">
  <div class="status-item">
    <div class="status-dot" id="snn-dot"></div>
    <span>SNN <span id="snn-status">--</span></span>
  </div>
  <div class="status-item">
    <div class="status-dot" id="neuromod-dot"></div>
    <span>调质层 <span id="neuromod-status">--</span></span>
  </div>
  <div class="status-item">
    <span>🕐 <span id="clock">--:--</span></span>
  </div>
  <div class="status-item">
    <span>Tick: <span id="tick-count">0</span> / Real: <span id="real-step">0</span></span>
  </div>
</div>

<div class="grid">

  <!-- SNN 驱动状态 -->
  <div class="card">
    <div class="card-title"><span class="icon">⚡</span> SNN 快层驱动</div>
    <div id="snn-drives"></div>
  </div>

  <!-- 调质层状态 -->
  <div class="card">
    <div class="card-title"><span class="icon">🧪</span> 神经调质浓度</div>
    <div class="mod-grid" id="mod-grid"></div>
  </div>

  <!-- 神经元可视化 -->
  <div class="card">
    <div class="card-title"><span class="icon">🧠</span> 隐藏层神经元 (16)</div>
    <div class="neuron-grid" id="hidden-neurons"></div>
    <div style="margin-top:12px;">
      <div class="card-title" style="font-size:0.85em"><span class="icon">🎯</span> 输出层 (6)</div>
      <div class="neuron-grid" id="output-neurons"></div>
    </div>
  </div>

  <!-- 系统参数 -->
  <div class="card">
    <div class="card-title"><span class="icon">📊</span> 系统参数</div>
    <div class="stats-grid" id="stats-grid"></div>
  </div>

  <!-- 驱动历史图表 -->
  <div class="card full-width">
    <div class="card-title"><span class="icon">📈</span> 驱动历史 (最近 60 个采样)</div>
    <div class="chart-container"><canvas id="drive-chart"></canvas></div>
  </div>

  <!-- 调质历史图表 -->
  <div class="card full-width">
    <div class="card-title"><span class="icon">��</span> 调质浓度历史 (最近 60 个采样)</div>
    <div class="chart-container"><canvas id="mod-chart"></canvas></div>
  </div>

  <!-- 权重热力图 -->
  <div class="card">
    <div class="card-title"><span class="icon">🔥</span> 突触权重热力图</div>
    <div class="heatmap-container">
      <div class="heatmap">
        <div class="heatmap-title">输入→隐藏 (16×8)</div>
        <canvas id="heatmap-ih" class="heatmap-canvas" width="160" height="320"></canvas>
      </div>
      <div class="heatmap">
        <div class="heatmap-title">隐藏→输出 (6×16)</div>
        <canvas id="heatmap-ho" class="heatmap-canvas" width="320" height="120"></canvas>
      </div>
    </div>
  </div>

  <!-- 习惯 + 昼夜节律 -->
  <div class="card">
    <div class="card-title"><span class="icon">🌙</span> 习惯 & 昼夜节律</div>
    <div style="margin-bottom:12px;">
      <div style="font-size:0.8em;color:var(--text-dim);margin-bottom:6px">已形成习惯</div>
      <div class="habit-list" id="habit-list">
        <span style="color:var(--text-dim);font-size:0.8em">暂无数据</span>
      </div>
    </div>
    <div style="display:flex;gap:20px;align-items:center">
      <div>
        <div style="font-size:0.8em;color:var(--text-dim);margin-bottom:4px">昼夜节律</div>
        <div class="circadian-clock" id="circadian-clock">
          <div class="clock-hand clock-hour" id="clock-hour"></div>
          <div class="clock-hand clock-minute" id="clock-minute"></div>
        </div>
      </div>
      <div>
        <div id="circadian-info" style="font-size:0.85em;line-height:1.8"></div>
      </div>
    </div>
  </div>

  <!-- 做梦系统 -->
  <div class="card">
    <div class="card-title"><span class="icon">💤</span> 做梦系统</div>
    <div id="dream-panel">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div>
          <div style="font-size:0.75em;color:var(--text-dim)">状态</div>
          <div id="dream-status" style="font-size:1.1em;font-weight:600">待机</div>
        </div>
        <div>
          <div style="font-size:0.75em;color:var(--text-dim)">当前阶段</div>
          <div id="dream-phase" style="font-size:1.1em;font-weight:600">AWAKE</div>
        </div>
        <div>
          <div style="font-size:0.75em;color:var(--text-dim)">已做梦次数</div>
          <div id="dream-count" style="font-size:1.1em;font-weight:600">0</div>
        </div>
        <div>
          <div style="font-size:0.75em;color:var(--text-dim)">距下次做梦</div>
          <div id="dream-next" style="font-size:0.9em;color:var(--cyan)">--</div>
        </div>
      </div>
      <div style="font-size:0.8em;color:var(--text-dim);margin-bottom:6px">最近梦境</div>
      <div id="dream-history" style="max-height:180px;overflow-y:auto">
        <span style="color:var(--text-dim);font-size:0.8em">暂无梦境记录</span>
      </div>
    </div>
  </div>

</div>

<script>
const DRIVE_COLORS = {
  arousal: '#ff6b9d', valence: '#4ecdc4', social_drive: '#a855f7',
  task_drive: '#f97316', exploration_drive: '#22c55e', rest_drive: '#3b82f6'
};
const DRIVE_CN = {
  arousal: '激活', valence: '情绪', social_drive: '社交',
  task_drive: '任务', exploration_drive: '探索', rest_drive: '休息'
};
const MOD_COLORS = {
  curiosity: '#22c55e', sociability: '#a855f7', diligence: '#f97316',
  contentment: '#4ecdc4', energy: '#eab308'
};
const MOD_CN = { curiosity:'好奇心', sociability:'社交欲', diligence:'专注力', contentment:'满足感', energy:'精力' };
const MAX_HISTORY = 60;

let driveHistory = {};
let modHistory = {};
let driveChart, modChart;

function initCharts() {
  const driveCtx = document.getElementById('drive-chart').getContext('2d');
  driveChart = new Chart(driveCtx, {
    type: 'line',
    data: { labels: [], datasets: Object.keys(DRIVE_CN).map(k => ({
      label: DRIVE_CN[k], data: [], borderColor: DRIVE_COLORS[k],
      backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.3
    }))},
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { min: -0.5, max: 0.5, grid: { color: '#2a2a4a' }, ticks: { color: '#8888aa', font: { size: 10 } } },
                x: { display: false } },
      plugins: { legend: { labels: { color: '#e0e0f0', font: { size: 10 }, boxWidth: 12 } } },
      animation: { duration: 300 }
    }
  });

  const modCtx = document.getElementById('mod-chart').getContext('2d');
  modChart = new Chart(modCtx, {
    type: 'line',
    data: { labels: [], datasets: Object.keys(MOD_CN).map(k => ({
      label: MOD_CN[k], data: [], borderColor: MOD_COLORS[k],
      backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.3
    }))},
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { min: 0, max: 1, grid: { color: '#2a2a4a' }, ticks: { color: '#8888aa', font: { size: 10 } } },
                x: { display: false } },
      plugins: { legend: { labels: { color: '#e0e0f0', font: { size: 10 }, boxWidth: 12 } } },
      animation: { duration: 300 }
    }
  });
}

function mapValue(v, inMin, inMax, outMin, outMax) {
  return outMin + (v - inMin) / (inMax - inMin) * (outMax - outMin);
}

function getBarColor(value, min, max) {
  const norm = (value - min) / (max - min || 1);
  if (norm > 0.7) return 'linear-gradient(90deg, #22c55e, #4ecdc4)';
  if (norm > 0.4) return 'linear-gradient(90deg, #3b82f6, #6366f1)';
  if (norm > 0.2) return 'linear-gradient(90deg, #eab308, #f97316)';
  return 'linear-gradient(90deg, #ef4444, #dc2626)';
}

function neuronColor(v, threshold) {
  if (v <= 0) return `rgba(30,30,60,0.8)`;
  const ratio = Math.min(v / threshold, 1.5);
  const r = Math.round(78 + ratio * 100);
  const g = Math.round(205 - ratio * 60);
  const b = Math.round(196 - ratio * 40);
  return `rgba(${r},${g},${b},${0.3 + ratio * 0.7})`;
}

function drawHeatmap(canvasId, data, cellW, cellH) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data || !data.length) return;
  const ctx = canvas.getContext('2d');
  const rows = data.length;
  const cols = data[0].length;
  canvas.width = cols * cellW;
  canvas.height = rows * cellH;

  let wMin = Infinity, wMax = -Infinity;
  for (const row of data) for (const v of row) { wMin = Math.min(wMin, v); wMax = Math.max(wMax, v); }
  const range = Math.max(Math.abs(wMin), Math.abs(wMax), 0.01);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const v = data[r][c] / range;
      let cr, cg, cb;
      if (v >= 0) { cr = 30; cg = Math.round(80 + v * 175); cb = Math.round(80 + v * 116); }
      else { cr = Math.round(80 + (-v) * 175); cg = 30; cb = 30; }
      ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
      ctx.fillRect(c * cellW, r * cellH, cellW - 1, cellH - 1);
    }
  }
}

function updateDrives(drives, discrete) {
  const container = document.getElementById('snn-drives');
  if (!drives) { container.innerHTML = '<span style="color:var(--text-dim)">SNN 未启用</span>'; return; }
  let html = '';
  for (const [key, val] of Object.entries(drives)) {
    const level = discrete ? discrete[key] || '' : '';
    const pct = mapValue(val, -0.5, 0.5, 0, 100);
    const bg = getBarColor(val, -0.5, 0.5);
    html += `<div class="drive-bar-container">
      <div class="drive-label"><span>${DRIVE_CN[key]||key} · ${level}</span><span>${val.toFixed(4)}</span></div>
      <div class="drive-bar"><div class="drive-fill" style="width:${Math.max(pct,2)}%;background:${bg}"></div></div>
    </div>`;
  }
  container.innerHTML = html;
}

function updateMods(mods, discrete) {
  const grid = document.getElementById('mod-grid');
  if (!mods) { grid.innerHTML = '<span style="color:var(--text-dim)">调质层未启用</span>'; return; }
  let html = '';
  for (const [key, val] of Object.entries(mods)) {
    const level = discrete ? discrete[key] || '' : '';
    html += `<div class="mod-item">
      <div class="mod-value">${(val * 100).toFixed(0)}%</div>
      <div class="mod-name">${MOD_CN[key]||key}</div>
      <span class="mod-level level-${level}">${level}</span>
    </div>`;
  }
  grid.innerHTML = html;
}

function updateNeurons(hiddenV, hiddenSpikes, outputV, outputSpikes, hThresh, oThresh) {
  function renderNeurons(containerId, voltages, spikes, threshold) {
    const c = document.getElementById(containerId);
    if (!voltages) { c.innerHTML = ''; return; }
    let html = '';
    for (let i = 0; i < voltages.length; i++) {
      const v = voltages[i];
      const isSpiking = spikes && spikes[i];
      const bg = neuronColor(v, threshold || 0.15);
      const cls = isSpiking ? 'neuron spike' : 'neuron';
      html += `<div class="${cls}" style="background:${bg}" title="v=${v.toFixed(3)}"></div>`;
    }
    c.innerHTML = html;
  }
  renderNeurons('hidden-neurons', hiddenV, hiddenSpikes, hThresh);
  renderNeurons('output-neurons', outputV, outputSpikes, oThresh);
}

function updateStats(health) {
  const grid = document.getElementById('stats-grid');
  if (!health) { grid.innerHTML = ''; return; }
  const items = [
    ['隐藏层阈值', health.hidden_threshold?.toFixed(3)],
    ['输出层阈值', health.output_threshold?.toFixed(3)],
    ['输入增益', health.input_gain?.toFixed(2)],
    ['脉冲增益', health.hidden_spike_gain?.toFixed(2)],
    ['连续增益', health.hidden_cont_gain?.toFixed(2)],
    ['噪声σ', health.noise_std?.toFixed(3)],
    ['隐藏放电率', health.hidden_rate_ema?.toFixed(3)],
    ['输出放电率', health.output_rate_ema?.toFixed(3)],
    ['W_ih norm', health.syn_in_hid?.w_norm?.toFixed(3)],
    ['W_ho norm', health.syn_hid_out?.w_norm?.toFixed(3)],
    ['W_ih std', health.syn_in_hid?.w_std?.toFixed(4)],
    ['W_ho std', health.syn_hid_out?.w_std?.toFixed(4)],
  ];
  grid.innerHTML = items.map(([l,v]) =>
    `<div class="stat-item"><div class="stat-value">${v||'--'}</div><div class="stat-label">${l}</div></div>`
  ).join('');
}

function updateHabits(habits) {
  const list = document.getElementById('habit-list');
  if (!habits || Object.keys(habits).length === 0) {
    list.innerHTML = '<span style="color:var(--text-dim);font-size:0.8em">暂无数据</span>';
    return;
  }
  let html = '';
  for (const [key, h] of Object.entries(habits)) {
    if (h.total_count === 0) continue;
    let cls = 'habit-tag';
    if (h.strength > 0.7) cls += ' strong';
    else if (h.strength > 0.3) cls += ' forming';
    const cn = MOD_CN[key] || key;
    html += `<span class="${cls}">${cn} · ${h.streak}天 · 强度${(h.strength*100).toFixed(0)}%</span>`;
  }
  list.innerHTML = html || '<span style="color:var(--text-dim);font-size:0.8em">习惯尚在萌芽中...</span>';
}

function updateCircadian(circ) {
  const info = document.getElementById('circadian-info');
  if (!circ) { info.innerHTML = ''; return; }
  info.innerHTML = `
    精力基线: <b style="color:var(--cyan)">${(circ.energy*100).toFixed(0)}%</b><br>
    社交基线: <b style="color:var(--purple)">${(circ.sociability*100).toFixed(0)}%</b><br>
    当前时刻: <b>${circ.hour?.toFixed(1)}h</b>
  `;

  const hour = circ.hour || 0;
  const hourAngle = ((hour % 12) / 12) * 360 - 90;
  const minAngle = ((hour % 1) * 360) - 90;
  const hHand = document.getElementById('clock-hour');
  const mHand = document.getElementById('clock-minute');
  if (hHand) hHand.style.transform = `rotate(${hourAngle}deg)`;
  if (mHand) mHand.style.transform = `rotate(${minAngle}deg)`;
}

function updateCharts(drives, mods) {
  const now = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  if (drives && driveChart) {
    driveChart.data.labels.push(now);
    if (driveChart.data.labels.length > MAX_HISTORY) driveChart.data.labels.shift();
    Object.keys(DRIVE_CN).forEach((key, i) => {
      const ds = driveChart.data.datasets[i];
      ds.data.push(drives[key] || 0);
      if (ds.data.length > MAX_HISTORY) ds.data.shift();
    });
    driveChart.update('none');
  }

  if (mods && modChart) {
    modChart.data.labels.push(now);
    if (modChart.data.labels.length > MAX_HISTORY) modChart.data.labels.shift();
    Object.keys(MOD_CN).forEach((key, i) => {
      const ds = modChart.data.datasets[i];
      ds.data.push(mods[key] || 0);
      if (ds.data.length > MAX_HISTORY) ds.data.shift();
    });
    modChart.update('none');
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

async function fetchState() {
  try {
    const resp = await fetch('/snn/api/state');
    if (!resp.ok) return;
    const data = await resp.json();

    // SNN
    const snn = data.snn || {};
    const snnDot = document.getElementById('snn-dot');
    const snnStat = document.getElementById('snn-status');
    if (snn.status === 'active') {
      snnDot.className = 'status-dot dot-active';
      snnStat.textContent = '运行中';
      document.getElementById('tick-count').textContent = snn.tick_count || 0;
      document.getElementById('real-step').textContent = snn.real_step_count || 0;
      updateDrives(snn.drives, snn.drives_discrete);
      updateNeurons(snn.hidden_v, snn.hidden_spikes, snn.output_v, snn.output_spikes,
        snn.health?.hidden_threshold, snn.health?.output_threshold);
      updateStats(snn.health);
    } else {
      snnDot.className = 'status-dot dot-inactive';
      snnStat.textContent = '未启用';
      updateDrives(null);
      updateNeurons(null);
      updateStats(null);
    }

    // Neuromod
    const nm = data.neuromod || {};
    const nmDot = document.getElementById('neuromod-dot');
    const nmStat = document.getElementById('neuromod-status');
    if (nm.modulators) {
      nmDot.className = 'status-dot dot-active';
      nmStat.textContent = '运行中';
      updateMods(nm.modulators, nm.modulators_discrete);
      updateHabits(nm.habits);
      updateCircadian(nm.circadian);
    } else {
      nmDot.className = 'status-dot dot-inactive';
      nmStat.textContent = nm.status || '未启用';
      updateMods(null);
    }

    // Charts
    updateCharts(snn.drives, nm.modulators);

    // Dream
    const dream = data.dream || {};
    updateDream(dream);

    // Weights (less frequent)
    if (snn.status === 'active') {
      const wResp = await fetch('/snn/api/weights');
      if (wResp.ok) {
        const wData = await wResp.json();
        drawHeatmap('heatmap-ih', wData.syn_in_hid_W, 20, 20);
        drawHeatmap('heatmap-ho', wData.syn_hid_out_W, 20, 20);
      }
    }
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function updateDream(dream) {
  const statusEl = document.getElementById('dream-status');
  const phaseEl = document.getElementById('dream-phase');
  const countEl = document.getElementById('dream-count');
  const nextEl = document.getElementById('dream-next');
  const histEl = document.getElementById('dream-history');

  if (!dream || dream.status === 'disabled') {
    statusEl.textContent = '未启用';
    statusEl.style.color = 'var(--text-dim)';
    phaseEl.textContent = '--';
    return;
  }

  const phaseMap = {
    'awake': { text: '清醒', color: 'var(--green)', icon: '☀️' },
    'nrem': { text: 'NREM 回放', color: 'var(--blue)', icon: '🌊' },
    'rem': { text: 'REM 联想', color: 'var(--purple)', icon: '🌌' },
    'waking': { text: '觉醒过渡', color: 'var(--orange)', icon: '🌅' },
  };

  const phase = (dream.current_phase || 'awake').toLowerCase();
  const pi = phaseMap[phase] || phaseMap['awake'];

  if (dream.is_dreaming) {
    statusEl.textContent = '🌙 正在做梦';
    statusEl.style.color = 'var(--purple)';
  } else {
    statusEl.textContent = '待机';
    statusEl.style.color = 'var(--text)';
  }

  phaseEl.textContent = pi.icon + ' ' + pi.text;
  phaseEl.style.color = pi.color;

  countEl.textContent = dream.dream_count || 0;

  // 距下次做梦
  if (dream.last_dream_time && dream.last_dream_time > 0) {
    const elapsed = Date.now() / 1000 - dream.last_dream_time;
    const interval = (dream.dream_interval_seconds || 5400);
    const remaining = Math.max(0, interval - elapsed);
    if (remaining > 0) {
      const mins = Math.floor(remaining / 60);
      nextEl.textContent = `约 ${mins} 分钟`;
    } else {
      nextEl.textContent = '随时可能';
      nextEl.style.color = 'var(--green)';
    }
  } else {
    nextEl.textContent = '尚未做梦';
  }
}

// 异步获取做梦历史
async function fetchDreamHistory() {
  try {
    const resp = await fetch('/snn/api/dream');
    if (!resp.ok) return;
    const data = await resp.json();
    const histEl = document.getElementById('dream-history');
    const history = data.history || [];
    if (history.length === 0) {
      histEl.innerHTML = '<span style="color:var(--text-dim);font-size:0.8em">暂无梦境记录</span>';
      return;
    }
    histEl.innerHTML = history.map(d => {
      const t = new Date((d.start_time || 0) * 1000).toLocaleString('zh-CN', {
        month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'
      });
      const dur = (d.duration_seconds || 0).toFixed(1);
      const nrem = d.nrem ? `NREM: ${d.nrem.episodes_replayed || 0}集/${d.nrem.total_steps || 0}步` : '';
      const rem = d.rem ? `REM: ${d.rem.seeds_activated || 0}种子/${d.rem.new_edges || 0}新边` : '';
      return `<div style="background:var(--bg);padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:0.8em">
        <div style="display:flex;justify-content:space-between;color:var(--text-dim)">
          <span>🌙 ${t}</span><span>${dur}s</span>
        </div>
        <div style="margin-top:2px">${nrem}${nrem && rem ? ' · ' : ''}${rem}</div>
      </div>`;
    }).join('');
  } catch(e) { /* ignore */ }
}

initCharts();
updateClock();
fetchState();
fetchDreamHistory();
setInterval(fetchState, 3000);
setInterval(updateClock, 1000);
setInterval(fetchDreamHistory, 15000);
</script>
