<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo-MoFox · Memory Overview</title>
  <script src="https://unpkg.com/force-graph@1.43.3/dist/force-graph.min.js"></script>
  <style>
    :root {
      --bg: #06101e;
      --panel: rgba(10, 18, 34, 0.88);
      --panel-2: rgba(16, 28, 48, 0.88);
      --line: rgba(148, 163, 184, 0.14);
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #8b5cf6;
      --gold: #f59e0b;
      --danger: #fb7185;
      --file: #6366f1;
      --concept: #ec4899;
      --ok: #10b981;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: radial-gradient(circle at top left, #102349, transparent 28%), radial-gradient(circle at bottom right, #0b3b45, transparent 28%), var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); background: rgba(4, 10, 20, 0.82); backdrop-filter: blur(18px); }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: .04em; }
    .brand-badge { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 10px; background: linear-gradient(135deg, var(--file), var(--accent)); box-shadow: 0 0 20px rgba(56,189,248,.35); }
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar-group { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 12px; background: rgba(255,255,255,.03); border: 1px solid var(--line); }
    .toolbar label { font-size: 12px; color: var(--muted); }
    .toolbar input[type="range"] { width: 120px; }
    .toolbar .value { width: 46px; text-align: right; font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
    .toolbar button { border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--text); border-radius: 10px; padding: 8px 10px; cursor: pointer; }
    .toolbar button:hover { border-color: rgba(56,189,248,.4); }
    .toolbar button.active { background: rgba(56,189,248,.14); border-color: rgba(56,189,248,.45); }
    main { flex: 1; display: grid; grid-template-columns: minmax(0, 1fr) 400px; min-height: 0; }
    #graph-wrap { position: relative; min-width: 0; display: flex; align-items: stretch; justify-content: stretch; overflow: hidden; }
    #graph { flex: 1; min-width: 0; height: 100%; display: block; overflow: hidden; }
    #hover-card { position: absolute; z-index: 10; background: var(--panel); border: 1px solid var(--line); backdrop-filter: blur(16px); border-radius: 14px; box-shadow: 0 10px 35px rgba(0,0,0,.28); }
    #hover-card { left: 18px; top: 18px; min-width: 260px; max-width: 360px; padding: 14px; pointer-events: none; opacity: 0; transition: opacity .15s ease; }
    
    #event-log { width: 100%; display: flex; flex-direction: column; }
    #event-items { flex: 1; max-height: 180px; overflow-y: auto; padding-right: 4px; }
    #event-items::-webkit-scrollbar { width: 4px; }
    #event-items::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
    
    .side h3, .side h4 { margin: 0 0 10px; font-size: 12px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    .event-item { padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 12px; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .event-item:last-child { border-bottom: none; }
    .event-type { color: var(--accent); font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; }
    .side { border-left: 1px solid var(--line); background: var(--panel); backdrop-filter: blur(18px); min-height: 0; display: flex; flex-direction: column; }
    .side-scroll { overflow: auto; padding: 18px; }
    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box input { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--line); color: var(--text); border-radius: 12px; padding: 10px 12px; }
    .search-box button { border: 1px solid var(--line); background: rgba(56,189,248,.12); color: var(--text); border-radius: 12px; padding: 10px 12px; cursor: pointer; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
    .stat b { display: block; font-size: 18px; margin-bottom: 4px; color: var(--accent); }
    .card { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
    .chip { padding: 4px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--line); color: var(--muted); }
    .chip-file { color: #c7d2fe; }
    .chip-concept { color: #fbcfe8; }
    .chip-live { color: #fde68a; }
    .detail-title { font-size: 18px; font-weight: 700; line-height: 1.4; word-break: break-word; }
    .progress { height: 6px; background: rgba(255,255,255,.06); border-radius: 999px; overflow: hidden; }
    .progress > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
    .detail-grid .item { background: rgba(255,255,255,.025); border-radius: 12px; padding: 10px; }
    .detail-grid .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .detail-grid .value { font-size: 14px; font-weight: 700; }
    .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .inline-actions button { flex: 1; min-width: 120px; border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--text); border-radius: 12px; padding: 10px 12px; cursor: pointer; }
    .edge-list, .result-list { display: flex; flex-direction: column; gap: 8px; }
    .edge-item, .result-item { padding: 10px; border-radius: 12px; background: rgba(255,255,255,.025); border: 1px solid var(--line); }
    .edge-item strong, .result-item strong { display: block; margin-bottom: 4px; font-size: 13px; }
    .edge-bar { height: 5px; border-radius: 999px; background: rgba(255,255,255,.05); overflow: hidden; margin-top: 8px; }
    .edge-bar > div { height: 100%; background: linear-gradient(90deg, var(--gold), var(--danger)); }
    .empty { color: var(--muted); font-size: 13px; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: var(--muted); }
    .legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 999px; margin-right: 8px; vertical-align: middle; }
    .legend .file::before { background: var(--file); }
    .legend .concept::before { background: var(--concept); }
    .legend .search::before { background: var(--accent); }
    .legend .changed::before { background: var(--gold); }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-badge">∞</div>
      <div>Neo-MoFox <span class="meta">| Memory Overview</span></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-group">
        <label>节点数</label>
        <input id="node-limit" type="range" min="30" max="200" step="10" value="80" />
        <span id="node-limit-val" class="value">80</span>
      </div>
      <div class="toolbar-group">
        <label>边阈值</label>
        <input id="min-weight" type="range" min="0" max="1" step="0.05" value="0.15" />
        <span id="min-weight-val" class="value">0.15</span>
      </div>
      <div class="toolbar-group">
        <button id="btn-global" class="active">全局总览</button>
        <button id="btn-focus">局部聚焦</button>
        <button id="btn-refresh">刷新</button>
        <button id="btn-live" class="active">实时 ON</button>
      </div>
    </div>
  </header>

  <main>
    <section id="graph-wrap">
      <div id="graph"></div>
      <div id="hover-card"></div>
    </section>

    <aside class="side">
      <div class="side-scroll">
        <div id="event-log" class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin:0;">实时事件</h3>
            <div id="live-status" style="width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok);"></div>
          </div>
          <div id="event-items" class="empty">等待事件流...</div>
        </div>

        <div class="search-box">
          <input id="search-input" type="text" placeholder="搜索记忆主题 / 文件 / 概念..." />
          <button id="btn-search">搜索</button>
        </div>

        <div class="stats">
          <div class="stat"><b id="stat-nodes">0</b><span class="meta">节点</span></div>
          <div class="stat"><b id="stat-edges">0</b><span class="meta">边</span></div>
          <div class="stat"><b id="stat-avg">0</b><span class="meta">平均激活</span></div>
        </div>

        <div class="card">
          <h3>图例</h3>
          <div class="legend">
            <span class="file">FILE 节点</span>
            <span class="concept">CONCEPT 节点</span>
            <span class="search">搜索/扩散高亮</span>
            <span class="changed">写入/强化高亮</span>
          </div>
        </div>

        <div class="card" id="selection-card">
          <h3>节点详情</h3>
          <div id="selection-empty" class="empty">点击任意节点查看详情、相邻边和局部聚焦。</div>
          <div id="selection-detail" style="display:none;">
            <div class="detail-title" id="detail-title">-</div>
            <div class="chips">
              <span id="detail-type" class="chip">-</span>
              <span id="detail-degree" class="chip">度数 -</span>
              <span id="detail-live" class="chip chip-live">-</span>
            </div>
            <div class="meta" id="detail-path">-</div>
            <div style="margin:12px 0 8px; font-size:12px; color:var(--muted);">激活强度</div>
            <div class="progress"><div id="detail-activation-bar" style="width:0%"></div></div>
            <div class="detail-grid">
              <div class="item"><div class="label">Activation</div><div class="value" id="detail-activation">0</div></div>
              <div class="item"><div class="label">Importance</div><div class="value" id="detail-importance">0</div></div>
              <div class="item"><div class="label">Access</div><div class="value" id="detail-access">0</div></div>
              <div class="item"><div class="label">Valence</div><div class="value" id="detail-valence">0</div></div>
            </div>
            <div class="inline-actions">
              <button id="btn-node-focus">只看邻域</button>
              <button id="btn-node-activate">触发联想</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>相邻边</h3>
          <div id="edge-list" class="edge-list"><div class="empty">未选中节点</div></div>
        </div>

        <div class="card">
          <h3>搜索结果</h3>
          <div id="search-results" class="result-list"><div class="empty">输入关键词后可查看搜索命中与联想结果。</div></div>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const COLORS = {
      FILE: '#6366f1',
      CONCEPT: '#ec4899'
    };
    const EDGE_COLORS = {
      relates: '#94a3b8',
      causes: '#f59e0b',
      continues: '#10b981',
      contrasts: '#fb7185',
      mentions: '#38bdf8',
      associates: '#8b5cf6'
    };

    let Graph;
    let graphData = { nodes: [], links: [], meta: {} };
    let selectedNode = null;
    let hoverNode = null;
    let hoverLink = null;
    let liveSource = null;
    let currentMode = 'global';
    let lastFocusId = null;
    let searchResultCache = [];

    const selectedNodes = new Set();
    const selectedEdges = new Set();
    const searchNodes = new Set();
    const activatedNodes = new Set();
    const changedNodes = new Set();
    const activatedEdges = new Set();

    const hoverCard = document.getElementById('hover-card');
    const eventItems = document.getElementById('event-items');

    function nodeLimit() { return Number(document.getElementById('node-limit').value); }
    function minWeight() { return Number(document.getElementById('min-weight').value); }
    function getNodeId(v) { return typeof v === 'object' ? v?.id : v; }
    function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function linkKey(source, target) { return `${source}__${target}`; }
    function fmt(num, digits = 3) { return Number(num || 0).toFixed(digits); }
    function colorWithAlpha(hex, alpha) {
      const m = hex.replace('#', '');
      const full = m.length === 3 ? m.split('').map(x => x + x).join('') : m;
      const n = parseInt(full, 16);
      const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function pushEvent(type, text) {
      const row = document.createElement('div');
      row.className = 'event-item';
      row.innerHTML = `<div class="event-type">${escapeHtml(type)}</div><div>${escapeHtml(text)}</div>`;
      if (eventItems.classList.contains('empty')) {
        eventItems.classList.remove('empty');
        eventItems.innerHTML = '';
      }
      eventItems.prepend(row);
      while (eventItems.children.length > 10) eventItems.removeChild(eventItems.lastChild);
    }

    function flashSet(setObj, ids, duration = 4000) {
      ids.filter(Boolean).forEach(id => setObj.add(id));
      Graph?.refresh();
      setTimeout(() => {
        ids.filter(Boolean).forEach(id => setObj.delete(id));
        Graph?.refresh();
      }, duration);
    }

    function activateEdgePulse(edges, duration = 4500) {
      edges.forEach(id => activatedEdges.add(id));
      Graph?.refresh();
      setTimeout(() => {
        edges.forEach(id => activatedEdges.delete(id));
        Graph?.refresh();
      }, duration);
    }

    async function fetchJSON(url, init) {
      const res = await fetch(url, init);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function loadStats() {
      const stats = await fetchJSON('api/stats');
      document.getElementById('stat-nodes').textContent = (stats.file_nodes || 0) + (stats.concept_nodes || 0);
      document.getElementById('stat-edges').textContent = stats.total_edges || 0;
      document.getElementById('stat-avg').textContent = fmt(stats.avg_activation || 0, 3);
    }

    async function loadGraph() {
      try {
        const params = new URLSearchParams({
          limit_nodes: String(nodeLimit()),
          min_weight: String(minWeight())
        });
        if (currentMode === 'focus' && lastFocusId) params.set('focus_id', lastFocusId);
        graphData = await fetchJSON(`api/graph?${params.toString()}`);
        if (!graphData || !graphData.nodes) graphData = { nodes: [], links: [] };
        if (!Graph) initGraph();
        Graph.graphData(graphData);
        setTimeout(() => {
          Graph.zoomToFit(400, 50);
        }, 300);
        refreshSelectionPanel();
      } catch (err) {
        console.error('Load Graph Error:', err);
        pushEvent('error', `加载数据失败: ${err.message}`);
      }
    }

    function initGraph() {
      try {
        Graph = ForceGraph()(document.getElementById('graph'))
          .backgroundColor('#06101e')
          .graphData(graphData)
          .nodeId('id')
          .nodeLabel(node => `${node.title}\n${node.path || node.type}`)
          .linkLabel(link => `${link.type} | weight=${fmt(link.weight, 3)} | activation=${link.activation_count || 0}${link.reason ? ` | ${link.reason}` : ''}`)
          .nodeVal(node => {
            const act = Math.max(Number(node.activation) || 0.05, 0.05);
            return 2 + Math.pow(act, 0.7) * 6 + Math.min(Number(node.degree) || 0, 12) * 0.12;
          })
          .nodeColor(node => {
            if (selectedNodes.has(node.id)) return '#ffffff';
            if (changedNodes.has(node.id)) return '#f59e0b';
            if (activatedNodes.has(node.id)) return '#8b5cf6';
            if (searchNodes.has(node.id)) return '#38bdf8';
            const base = COLORS[node.type] || '#94a3b8';
            const alpha = 0.45 + Math.min(0.45, (Number(node.importance) || 0.3) * 0.45);
            return colorWithAlpha(base, alpha);
          })
          .linkColor(link => {
            const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
            const targetId = typeof link.target === 'object' ? link.target.id : link.target;
            const id = link.id || `${sourceId}__${targetId}`;
            if (selectedEdges.has(id)) return '#ffffff';
            if (activatedEdges.has(id)) return '#f59e0b';
            const base = EDGE_COLORS[link.type] || '#94a3b8';
            return colorWithAlpha(base, Math.min(0.9, 0.15 + (Number(link.weight) || 0) * 0.75));
          })
          .linkWidth(link => {
            const weight = Math.max(0, Number(link.weight) || 0);
            const base = Math.max(0.5, Math.pow(weight, 1.5) * 5);
            const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
            const targetId = typeof link.target === 'object' ? link.target.id : link.target;
            const id = link.id || `${sourceId}__${targetId}`;
            return selectedEdges.has(id) ? base + 2 : base;
          })
          .linkLineDash(link => {
            return (Number(link.weight) || 0) < 0.3 ? [4, 4] : [];
          })
          .onNodeClick(node => selectNode(node))
          .onNodeHover((node, prevNode, event) => { hoverLink = null; hoverNode = node; renderHover(event); document.getElementById('graph').style.cursor = node ? 'pointer' : 'default'; })
          .onLinkHover((link, prevLink, event) => { hoverNode = null; hoverLink = link; renderHover(event); })
          .nodeCanvasObject((node, ctx, globalScale) => {
            try {
              const act = Math.max(Number(node.activation) || 0.05, 0.05);
              const size = 2 + Math.pow(act, 0.7) * 6;
              if (selectedNodes.has(node.id) || searchNodes.has(node.id) || activatedNodes.has(node.id) || changedNodes.has(node.id)) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, size + 5, 0, 2 * Math.PI);
                ctx.fillStyle = selectedNodes.has(node.id)
                  ? 'rgba(255,255,255,.18)'
                  : changedNodes.has(node.id)
                    ? 'rgba(245,158,11,.18)'
                    : activatedNodes.has(node.id)
                      ? 'rgba(139,92,246,.18)'
                      : 'rgba(56,189,248,.18)';
                ctx.fill();
              }
              ctx.beginPath();
              ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
              ctx.fillStyle = selectedNodes.has(node.id)
                ? '#ffffff'
                : changedNodes.has(node.id)
                  ? '#f59e0b'
                  : activatedNodes.has(node.id)
                    ? '#8b5cf6'
                    : searchNodes.has(node.id)
                      ? '#38bdf8'
                      : COLORS[node.type] || '#94a3b8';
              ctx.fill();

              const showLabel = globalScale > 1.8 || selectedNodes.has(node.id) || searchNodes.has(node.id) || hoverNode === node;
              if (showLabel) {
                const label = node.title || node.id || "Unknown";
                const fontSize = Math.max(10 / globalScale, 3);
                ctx.font = `${fontSize}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                const width = ctx.measureText(label).width;
                ctx.fillStyle = 'rgba(3,8,18,.65)';
                ctx.fillRect(node.x - width / 2 - 4, node.y + size + 2, width + 8, fontSize + 6);
                ctx.fillStyle = 'rgba(229,238,252,.92)';
                ctx.fillText(label, node.x, node.y + size + 5);
              }
            } catch(err) {
              // 静默处理单节点渲染异常，防止阻断整体刷新
            }
          });

        // 调整全局引力
        Graph.d3Force('charge').strength(-400);
        Graph.d3Force('link').distance(150);
        
        // 关键修复：确保图谱布局不会在一开始因为容器没量好尺寸缩到左上角
        const container = document.getElementById('graph');
        const resizeObserver = new ResizeObserver(entries => {
          for (let entry of entries) {
            const { width, height } = entry.contentRect;
            if (width > 0 && height > 0) {
              Graph.width(width);
              Graph.height(height);
              Graph.d3Force('center', d3.forceCenter(width / 2, height / 2));
              Graph.zoomToFit(400, 50);
            }
          }
        });
        resizeObserver.observe(container);

        Graph.onEngineStop(() => {
          if (!window.__graph_ready) {
            window.__graph_ready = true;
            pushEvent('sys', '图谱渲染就绪');
          }
        });

      } catch (err) {
        console.error('Init Graph Error:', err);
        pushEvent('error', `图谱初始化失败: ${err.message}`);
      }
    }

    function renderHover(event) {
      if (!hoverNode && !hoverLink) {
        hoverCard.style.opacity = '0';
        hoverCard.innerHTML = '';
        return;
      }
      hoverCard.style.opacity = '1';
      
      // 让 hoverCard 跟随鼠标
      if (event) {
        const rect = document.getElementById('graph').getBoundingClientRect();
        let left = event.clientX - rect.left + 15;
        let top = event.clientY - rect.top + 15;
        hoverCard.style.left = `${left}px`;
        hoverCard.style.top = `${top}px`;
      }

      if (hoverLink) {
        hoverCard.innerHTML = `
          <div class="meta">边详情</div>
          <div style="font-size:15px;font-weight:700;margin:4px 0 10px;">${escapeHtml(hoverLink.type)}</div>
          <div>weight: <b>${fmt(hoverLink.weight, 3)}</b></div>
          <div>activation_count: <b>${hoverLink.activation_count || 0}</b></div>
          <div style="margin-top:6px;">${escapeHtml(hoverLink.reason || '无 reason')}</div>
          <div class="meta" style="margin-top:8px;">${escapeHtml(getNodeId(hoverLink.source))} → ${escapeHtml(getNodeId(hoverLink.target))}</div>
        `;
        return;
      }
      hoverCard.innerHTML = `
        <div class="meta">节点详情</div>
        <div style="font-size:15px;font-weight:700;margin:4px 0 10px;">${escapeHtml(hoverNode.title)}</div>
        <div>type: <b>${escapeHtml(hoverNode.type)}</b></div>
        <div>activation: <b>${fmt(hoverNode.activation, 3)}</b></div>
        <div>degree: <b>${hoverNode.degree || 0}</b></div>
        <div class="meta" style="margin-top:8px;">${escapeHtml(hoverNode.path || 'Virtual Concept')}</div>
      `;
    }

    function selectNode(node) {
      selectedNode = node;
      selectedNodes.clear();
      selectedEdges.clear();
      selectedNodes.add(node.id);
      for (const link of graphData.links) {
        const sourceId = getNodeId(link.source);
        const targetId = getNodeId(link.target);
        if (sourceId === node.id || targetId === node.id) {
          selectedEdges.add(link.id || linkKey(sourceId, targetId));
          selectedNodes.add(sourceId);
          selectedNodes.add(targetId);
        }
      }
      Graph.centerAt(node.x, node.y, 700);
      Graph.zoom(2.2, 700);
      refreshSelectionPanel();
      Graph.refresh();
    }

    function getNeighborEdges(nodeId) {
      return graphData.links
        .filter(link => getNodeId(link.source) === nodeId || getNodeId(link.target) === nodeId)
        .sort((a, b) => (b.weight || 0) - (a.weight || 0));
    }

    function refreshSelectionPanel() {
      const empty = document.getElementById('selection-empty');
      const detail = document.getElementById('selection-detail');
      const edgeList = document.getElementById('edge-list');
      if (!selectedNode) {
        empty.style.display = 'block';
        detail.style.display = 'none';
        edgeList.innerHTML = '<div class="empty">未选中节点</div>';
        return;
      }
      empty.style.display = 'none';
      detail.style.display = 'block';
      document.getElementById('detail-title').textContent = selectedNode.title || selectedNode.id;
      const typeEl = document.getElementById('detail-type');
      typeEl.textContent = selectedNode.type;
      typeEl.className = `chip ${selectedNode.type === 'FILE' ? 'chip-file' : 'chip-concept'}`;
      document.getElementById('detail-degree').textContent = `度数 ${selectedNode.degree || 0}`;
      document.getElementById('detail-live').textContent = `updated ${selectedNode.updated_at ? new Date(selectedNode.updated_at * 1000).toLocaleTimeString() : '-'}`;
      document.getElementById('detail-path').textContent = selectedNode.path || 'Virtual Concept';
      document.getElementById('detail-activation').textContent = fmt(selectedNode.activation, 3);
      document.getElementById('detail-activation-bar').style.width = `${Math.min(100, (selectedNode.activation || 0) * 100)}%`;
      document.getElementById('detail-importance').textContent = fmt(selectedNode.importance, 2);
      document.getElementById('detail-access').textContent = selectedNode.access_count || 0;
      document.getElementById('detail-valence').textContent = fmt(selectedNode.valence, 2);

      const edges = getNeighborEdges(selectedNode.id);
      if (!edges.length) {
        edgeList.innerHTML = '<div class="empty">当前节点没有可见相邻边</div>';
      } else {
        edgeList.innerHTML = edges.map(link => {
          const sourceId = getNodeId(link.source);
          const targetId = getNodeId(link.target);
          const otherId = sourceId === selectedNode.id ? targetId : sourceId;
          const otherNode = graphData.nodes.find(n => n.id === otherId);
          return `
            <div class="edge-item">
              <strong>${escapeHtml(link.type)} → ${escapeHtml(otherNode?.title || otherId)}</strong>
              <div class="meta">weight ${fmt(link.weight, 3)} · activation ${link.activation_count || 0}</div>
              <div>${escapeHtml(link.reason || '无 reason')}</div>
              <div class="edge-bar"><div style="width:${Math.min(100, (link.weight || 0) * 100)}%"></div></div>
            </div>
          `;
        }).join('');
      }
    }

    function upsertNode(node) {
      const idx = graphData.nodes.findIndex(n => n.id === node.id);
      if (idx >= 0) graphData.nodes[idx] = { ...graphData.nodes[idx], ...node };
      else graphData.nodes.push(node);
    }

    function upsertEdge(edge) {
      const idx = graphData.links.findIndex(l => l.id === edge.id || (getNodeId(l.source) === edge.source && getNodeId(l.target) === edge.target && l.type === edge.type));
      if (idx >= 0) graphData.links[idx] = { ...graphData.links[idx], ...edge };
      else graphData.links.push(edge);
    }

    function refreshGraphPreservingSelection() {
      Graph.graphData(graphData);
      if (selectedNode) {
        const latest = graphData.nodes.find(n => n.id === selectedNode.id);
        if (latest) selectedNode = latest;
      }
      refreshSelectionPanel();
      Graph.refresh();
    }

    function connectLive() {
      if (liveSource) liveSource.close();
      liveSource = new EventSource('api/events');
      liveSource.addEventListener('snapshot', e => {
        pushEvent('snapshot', '已连接实时事件流');
      });
      liveSource.addEventListener('memory.search.started', e => {
        const event = JSON.parse(e.data);
        pushEvent('search', `开始搜索：${event.payload.query}`);
      });
      liveSource.addEventListener('memory.search.seeds', e => {
        const event = JSON.parse(e.data);
        const ids = (event.payload.results || []).map(item => item.id);
        flashSet(searchNodes, ids, 5000);
        pushEvent('search.seeds', `命中 ${ids.length} 个直接结果`);
      });
      liveSource.addEventListener('memory.activation.spread', e => {
        const event = JSON.parse(e.data);
        const ids = (event.payload.results || []).map(item => item.id);
        flashSet(activatedNodes, ids, 5500);
        const edgeIds = [];
        for (const item of event.payload.results || []) {
          const path = item.association_path || item.path || [];
          for (let i = 0; i < path.length - 1; i++) {
            const sourceId = path[i], targetId = path[i + 1];
            const edge = graphData.links.find(l => getNodeId(l.source) === sourceId && getNodeId(l.target) === targetId);
            if (edge) edgeIds.push(edge.id || linkKey(sourceId, targetId));
          }
        }
        activateEdgePulse(edgeIds, 5500);
        pushEvent('activation', `扩散到 ${ids.length} 个联想节点`);
      });
      liveSource.addEventListener('memory.nodes.created', e => {
        const event = JSON.parse(e.data);
        upsertNode(event.payload.node);
        flashSet(changedNodes, [event.payload.node.id], 5000);
        refreshGraphPreservingSelection();
        pushEvent('node.created', `新增节点：${event.payload.node.title || event.payload.node.id}`);
      });
      liveSource.addEventListener('memory.nodes.updated', e => {
        const event = JSON.parse(e.data);
        for (const node of event.payload.nodes || []) upsertNode(node);
        flashSet(changedNodes, (event.payload.nodes || []).map(n => n.id), 3500);
        refreshGraphPreservingSelection();
      });
      liveSource.addEventListener('memory.edges.created', e => {
        const event = JSON.parse(e.data);
        upsertEdge(event.payload.edge);
        activateEdgePulse([event.payload.edge.id], 4500);
        refreshGraphPreservingSelection();
        pushEvent('edge.created', `${event.payload.edge.type} weight=${fmt(event.payload.edge.weight, 3)}`);
      });
      liveSource.addEventListener('memory.edges.updated', e => {
        const event = JSON.parse(e.data);
        upsertEdge(event.payload.edge);
        activateEdgePulse([event.payload.edge.id], 4500);
        refreshGraphPreservingSelection();
      });
      liveSource.addEventListener('memory.edges.reinforced', e => {
        const event = JSON.parse(e.data);
        for (const edge of event.payload.edges || []) upsertEdge(edge);
        activateEdgePulse((event.payload.edges || []).map(edge => edge.id), 5500);
        pushEvent('reinforced', `强化 ${event.payload.edges?.length || 0} 条边`);
        refreshGraphPreservingSelection();
      });
      liveSource.addEventListener('memory.search.finished', e => {
        const event = JSON.parse(e.data);
        pushEvent('search.finished', `搜索完成，总结果 ${event.payload.total_found}`);
      });
      liveSource.onerror = () => {
        pushEvent('live', '实时连接中断，等待自动重连');
      };
    }

    function disconnectLive() {
      if (liveSource) {
        liveSource.close();
        liveSource = null;
      }
    }

    async function runSearch() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      const box = document.getElementById('search-results');
      box.innerHTML = '<div class="empty">搜索中...</div>';
      try {
        const data = await fetchJSON(`api/search?query=${encodeURIComponent(query)}&top_k=8`);
        searchResultCache = data;
        if (!data.length) {
          box.innerHTML = '<div class="empty">未找到结果</div>';
          return;
        }
        box.innerHTML = data.map(item => `
          <div class="result-item">
            <strong>${escapeHtml(item.title || item.file_path)}</strong>
            <div class="meta">${escapeHtml(item.source)} · relevance ${fmt(item.relevance, 3)}</div>
            <div>${escapeHtml(item.snippet || '')}</div>
            ${item.association_reason ? `<div class="meta" style="margin-top:6px;">${escapeHtml(item.association_reason)}</div>` : ''}
          </div>
        `).join('');
      } catch (e) {
        box.innerHTML = `<div class="empty">搜索失败：${escapeHtml(e.message)}</div>`;
      }
    }

    async function triggerActivation() {
      if (!selectedNode) return;
      await fetchJSON('api/activate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ seed_ids: [selectedNode.id], max_depth: 2, max_results: 10 })
      });
    }

    function bindUI() {
      const nodeLimitInput = document.getElementById('node-limit');
      const minWeightInput = document.getElementById('min-weight');
      nodeLimitInput.addEventListener('input', () => document.getElementById('node-limit-val').textContent = nodeLimitInput.value);
      minWeightInput.addEventListener('input', () => document.getElementById('min-weight-val').textContent = Number(minWeightInput.value).toFixed(2));
      nodeLimitInput.addEventListener('change', loadGraph);
      minWeightInput.addEventListener('change', loadGraph);
      document.getElementById('btn-refresh').addEventListener('click', async () => { await loadStats(); await loadGraph(); });
      document.getElementById('btn-global').addEventListener('click', async () => {
        currentMode = 'global';
        lastFocusId = null;
        document.getElementById('btn-global').classList.add('active');
        document.getElementById('btn-focus').classList.remove('active');
        await loadGraph();
      });
      document.getElementById('btn-focus').addEventListener('click', async () => {
        if (!selectedNode) return;
        currentMode = 'focus';
        lastFocusId = selectedNode.id;
        document.getElementById('btn-focus').classList.add('active');
        document.getElementById('btn-global').classList.remove('active');
        await loadGraph();
      });
      document.getElementById('btn-node-focus').addEventListener('click', async () => {
        if (!selectedNode) return;
        currentMode = 'focus';
        lastFocusId = selectedNode.id;
        document.getElementById('btn-focus').classList.add('active');
        document.getElementById('btn-global').classList.remove('active');
        await loadGraph();
      });
      document.getElementById('btn-node-activate').addEventListener('click', triggerActivation);
      document.getElementById('btn-search').addEventListener('click', runSearch);
      document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
      document.getElementById('btn-live').addEventListener('click', () => {
        const btn = document.getElementById('btn-live');
        const on = btn.classList.toggle('active');
        btn.textContent = on ? '实时 ON' : '实时 OFF';
        if (on) connectLive(); else disconnectLive();
      });
    }

    async function boot() {
      try {
        bindUI();
        document.getElementById('node-limit-val').textContent = String(nodeLimit());
        document.getElementById('min-weight-val').textContent = minWeight().toFixed(2);
        await loadStats();
        await loadGraph();
        connectLive();
      } catch (err) {
        console.error("启动失败", err);
        pushEvent("error", `初始化错误: ${err.message}`);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
