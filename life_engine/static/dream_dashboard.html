<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Subconscious Observatory | Neo-MoFox</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap');

    :root {
      --bg: #02040a;
      --accent: #38bdf8;
      --accent-rgb: 56, 189, 248;
      --violet: #8b5cf6;
      --violet-rgb: 139, 92, 246;
      --gold: #fbbf24;
      --text: #f0f9ff;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }

    /* 全屏氛围底色 */
    .ambiance {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05), transparent 40%);
      z-index: 0;
    }

    /* 噪声纹理 */
    .grain {
      position: absolute;
      inset: 0;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.12;
      pointer-events: none;
      z-index: 100;
      mix-blend-mode: overlay;
    }

    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

    /* HUD 面板层 */
    .hud {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }

    .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
    
    .brand { border-left: 2px solid var(--accent); padding-left: 20px; }
    .brand h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-style: italic; font-weight: 400; letter-spacing: -0.02em; }
    .brand p { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 4px; }

    .phase-indicator {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.4; transform: scale(0.8); } }

    .phase-text { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }

    .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; }
    
    .telemetry { width: 340px; display: flex; flex-direction: column; gap: 20px; }
    
    .metric { display: flex; flex-direction: column; gap: 8px; }
    .metric-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.2em; text-transform: uppercase; }
    .metric-bar { height: 2px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 2px; position: relative; overflow: hidden; }
    .metric-bar-fill { position: absolute; height: 100%; background: var(--accent); width: 40%; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .metric-val { font-size: 18px; font-weight: 300; }

    /* 事件日志悬浮窗 */
    .event-log-wrap {
      position: absolute;
      right: 40px;
      top: 150px;
      width: 300px;
      max-height: 50vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .event-card {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 15px;
      border-radius: 12px;
      font-size: 11px;
      line-height: 1.6;
      animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      border-left: 2px solid var(--accent);
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

    .event-card .type { opacity: 0.4; margin-bottom: 4px; display: block; letter-spacing: 0.1em; }
    .event-card .msg { font-weight: 500; color: rgba(255,255,255,0.9); }

    /* Seed Shards (SVG Overlay) */
    .seed-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    .seed-shard {
      position: absolute;
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      font-size: 11px;
      color: var(--accent);
      white-space: nowrap;
      border-radius: 4px;
      transition: all 0.5s ease;
      opacity: 0;
      transform: scale(0.8);
    }
    .seed-shard.active { opacity: 1; transform: scale(1); }

    /* 中心核心提示 */
    .center-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="ambiance"></div>
  <div class="grain"></div>
  
  <canvas id="main-canvas"></canvas>
  <div class="seed-layer" id="seed-layer"></div>

  <div class="hud">
    <div class="top-bar">
      <div class="brand">
        <h1>Dream Observatory</h1>
        <p>Post-Conscious Synthesis Engine</p>
      </div>
      <div class="phase-indicator">
        <div class="dot" id="phase-dot"></div>
        <div class="phase-text" id="phase-label">Initializing</div>
      </div>
    </div>

    <div class="event-log-wrap" id="event-log"></div>

    <div class="bottom-bar">
      <div class="telemetry">
        <div class="metric">
          <div class="metric-label">Neural Synchrony (Entropy)</div>
          <div class="metric-val" id="entropy-val">0.000</div>
          <div class="metric-bar"><div class="metric-bar-fill" id="entropy-bar"></div></div>
        </div>
        <div class="metric">
          <div class="metric-label">Memory Cohesion</div>
          <div class="metric-val" id="cohesion-val">0.000</div>
          <div class="metric-bar"><div class="metric-bar-fill" id="cohesion-bar" style="background:var(--violet)"></div></div>
        </div>
      </div>
      
      <div style="text-align: right; max-width: 300px;">
        <p style="font-size: 10px; color: rgba(255,255,255,0.3); line-height: 1.8; letter-spacing: 0.05em;">
          Observing the transition between structured recall and stochastic re-association. 
          Real-time SNN weight updates active.
        </p>
      </div>
    </div>
  </div>

  <div class="center-hint">Continuous Subconscious Observation v0.4.2</div>

  <script>
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const seedLayer = document.getElementById('seed-layer');

    let width, height;
    let time = 0;
    let particles = [];
    let lines = [];
    let state = {
      phase: 'IDLE',
      entropy: 0.24,
      cohesion: 0.88,
      nodes_activated: 0,
      seeds: []
    };

    const COLORS = {
      NREM: { r: 56, g: 189, b: 248 },
      REM: { r: 139, g: 92, b: 246 },
      SEED: { r: 251, g: 191, b: 36 }
    };

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor(type = 'MIST') {
        this.reset(type);
      }
      reset(type) {
        this.type = type;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.r = Math.random() * 2 + 1;
        this.alpha = Math.random() * 0.5;
        this.life = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
      }
      draw() {
        const c = state.phase === 'REM' ? COLORS.REM : COLORS.NREM;
        ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class NeuralBranch {
      constructor(x, y, angle, depth) {
        this.x = x; this.y = y;
        this.angle = angle;
        this.length = 20 + Math.random() * 40;
        this.depth = depth;
        this.targetX = x + Math.cos(angle) * this.length;
        this.targetY = y + Math.sin(angle) * this.length;
        this.progress = 0;
      }
      update() {
        if (this.progress < 1) this.progress += 0.05;
      }
      draw() {
        ctx.strokeStyle = state.phase === 'REM' ? `rgba(139, 92, 246, ${0.4/this.depth})` : `rgba(56, 189, 248, ${0.4/this.depth})`;
        ctx.lineWidth = 2 / this.depth;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + (this.targetX - this.x) * this.progress, this.y + (this.targetY - this.y) * this.progress);
        ctx.stroke();
      }
    }

    let branches = [];

    function init() {
      resize();
      for (let i = 0; i < 100; i++) particles.push(new Particle());
      animate();
    }

    function animate() {
      ctx.fillStyle = 'rgba(2, 4, 10, 0.15)'; // 拖尾效果
      ctx.fillRect(0, 0, width, height);
      
      time += 0.01;

      // 绘制背景微粒
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      // 绘制中心核心
      drawCore();

      // 绘制神经分支
      branches.forEach(b => {
        b.update();
        b.draw();
      });

      // 渐进式更新 HUD
      updateHUD();

      requestAnimationFrame(animate);
    }

    function drawCore() {
      const cx = width / 2;
      const cy = height / 2;
      const r = 120 + Math.sin(time) * 10;
      
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      const c = state.phase === 'REM' ? COLORS.REM : COLORS.NREM;
      grad.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, 0.2)`);
      grad.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`);
      
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // 核心骨架
      ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, 0.4)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const ang = time + (i / 8) * Math.PI * 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(ang) * (r * 0.8), cy + Math.sin(ang) * (r * 0.8));
      }
      ctx.stroke();
    }

    function updateHUD() {
      document.getElementById('entropy-val').textContent = state.entropy.toFixed(3);
      document.getElementById('entropy-bar').style.width = (state.entropy * 100) + '%';
      document.getElementById('cohesion-val').textContent = state.cohesion.toFixed(3);
      document.getElementById('cohesion-bar').style.width = (state.cohesion * 100) + '%';
      
      const label = document.getElementById('phase-label');
      label.textContent = state.phase;
      const dot = document.getElementById('phase-dot');
      if (state.phase === 'REM') {
        dot.style.background = 'var(--violet)';
        dot.style.boxShadow = '0 0 10px var(--violet)';
        label.style.color = 'var(--violet)';
      } else {
        dot.style.background = 'var(--accent)';
        dot.style.boxShadow = '0 0 10px var(--accent)';
        label.style.color = 'var(--accent)';
      }
    }

    // 事件注入函数
    function pushEvent(type, msg) {
      const container = document.getElementById('event-log');
      const card = document.createElement('div');
      card.className = 'event-card';
      if (state.phase === 'REM') card.style.borderLeftColor = 'var(--violet)';
      card.innerHTML = `<span class="type">${type}</span><span class="msg">${msg}</span>`;
      container.prepend(card);
      if (container.children.length > 5) container.removeChild(container.lastChild);
    }

    function spawnSeeds(seeds) {
      seedLayer.innerHTML = '';
      seeds.forEach((seed, i) => {
        const shard = document.createElement('div');
        shard.className = 'seed-shard';
        shard.textContent = seed;
        const angle = (i / seeds.length) * Math.PI * 2;
        const r = 200 + Math.random() * 100;
        const x = width / 2 + Math.cos(angle) * r;
        const y = height / 2 + Math.sin(angle) * r;
        shard.style.left = x + 'px';
        shard.style.top = y + 'px';
        seedLayer.appendChild(shard);
        setTimeout(() => shard.classList.add('active'), i * 100);
      });
    }

    function spawnBranches(count = 5) {
      for(let i=0; i<count; i++) {
        const ang = Math.random() * Math.PI * 2;
        branches.push(new NeuralBranch(width/2, height/2, ang, 1));
      }
      if (branches.length > 100) branches.splice(0, 20);
    }

    // SSE 模拟连接与处理
    function connect() {
      const source = new EventSource('/memory_vis/api/events');
      
      source.addEventListener('dream.phase_change', e => {
        const data = JSON.parse(e.data);
        state.phase = data.payload.phase.toUpperCase();
        pushEvent('PHASE_CHANGE', `Transitioning to ${state.phase} cycle...`);
        if (state.phase === 'REM') {
          state.entropy = 0.65 + Math.random() * 0.2;
        } else {
          state.entropy = 0.2 + Math.random() * 0.1;
        }
      });

      source.addEventListener('dream.seeds_extracted', e => {
        const data = JSON.parse(e.data);
        const seeds = data.payload.seeds.map(s => s.theme_keyword || s.id);
        spawnSeeds(seeds);
        pushEvent('SEEDS_EXTRACTED', `Extracted ${seeds.length} cognitive seeds from event history.`);
      });

      source.addEventListener('memory.dream.walk', e => {
        const data = JSON.parse(e.data);
        state.nodes_activated += data.payload.activated_ids.length;
        state.cohesion = Math.min(0.99, state.cohesion + 0.01);
        spawnBranches(3);
        pushEvent('REM_WALK', `Spreading activation: ${data.payload.activated_ids.length} schemas integrated.`);
      });

      source.addEventListener('dream.scene_generating', e => {
        pushEvent('SYNTHESIS', 'Dream narrative construction in progress...');
      });

      source.addEventListener('dream.scene_generated', e => {
        pushEvent('COMPLETED', 'Subconscious scene rendered to memory residue.');
      });
    }

    window.addEventListener('resize', resize);
    init();
    connect();

    // 调试用：随机背景波动
    setInterval(() => {
      if (state.phase === 'REM') {
        state.entropy = 0.6 + Math.sin(time) * 0.1;
      }
    }, 100);

  </script>
</body>
</html>
