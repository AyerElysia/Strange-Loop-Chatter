<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-MoFox · 仿生记忆图谱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/force-graph"></script>
    <style>
        :root {
            --bg-color: #020617;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(148, 163, 184, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --cyan: #06b6d4;
            --cyan-glow: rgba(6, 182, 212, 0.5);
            --indigo: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.5);
            --pink: #ec4899;
            --pink-glow: rgba(236, 72, 153, 0.5);
            --emerald: #10b981;
            --amber: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(30, 27, 75, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(12, 74, 110, 0.3) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--indigo), var(--cyan));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--indigo-glow);
        }

        main {
            flex: 1;
            position: relative;
            display: flex;
        }

        #graph-container {
            flex: 1;
            cursor: grab;
        }

        #graph-container:active {
            cursor: grabbing;
        }

        /* 侧边面板 */
        .side-panel {
            width: 380px;
            background: var(--glass-bg);
            border-left: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        .panel-content {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
        }

        .panel-content::-webkit-scrollbar { width: 4px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .search-container {
            margin-bottom: 24px;
        }

        #search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        #search-input:focus {
            border-color: var(--indigo);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .node-detail-card {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 20px;
            border-radius: 16px;
            margin-top: 12px;
            display: none;
        }

        .node-detail-card.active {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .node-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .node-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            margin-right: 4px;
        }

        .btn-activate {
            width: 100%;
            background: var(--indigo);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-activate:hover {
            box-shadow: 0 0 15px var(--indigo-glow);
            transform: translateY(-1px);
        }

        .memory-log {
            margin-top: 24px;
        }

        .log-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.85rem;
        }

        .log-item:last-child { border-bottom: none; }

        .controls {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: flex;
            gap: 12px;
            z-index: 60;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        .control-btn:hover { background: rgba(255,255,255,0.15); }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--indigo);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: var(--text-dim); font-size: 0.9rem; letter-spacing: 0.1em;">正在同步仿生记忆图谱...</p>
    </div>

    <header>
        <div class="logo">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="m16 6-4 4-4-4"/><path d="M12 16v6"/><path d="m8 18 4-4 4 4"/></svg>
            </div>
            Neo-MoFox <span style="color:var(--text-dim); font-weight: 400">| Bionic Memory Map</span>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div id="status-tag" style="font-family:'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--emerald); display: flex; align-items: center; gap: 6px;">
                <span style="width: 8px; height: 8px; background: var(--emerald); border-radius: 50%; display: inline-block;"></span>
                SYNCED
            </div>
        </div>
    </header>

    <main>
        <div id="graph-container"></div>

        <div class="controls">
            <div class="control-btn" onclick="Graph.zoomToFit(400)" title="自适应窗口">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M12 3v18"/></svg>
            </div>
            <div class="control-btn" id="btn-toggle-labels" title="显示/隐藏标签">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-content">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="搜索记忆内容、节点、概念...">
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-val" id="stat-nodes">---</span>
                        <span class="stat-label">记忆节点</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val" id="stat-edges">---</span>
                        <span class="stat-label">关联边</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val" id="stat-avg-act">-.---</span>
                        <span class="stat-label">平均活跃度</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-val" id="stat-health">High</span>
                        <span class="stat-label">记忆完整度</span>
                    </div>
                </div>

                <div id="node-info-container">
                    <h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> 节点详情</h3>
                    <div id="welcome-msg" style="color: var(--text-dim); font-size: 0.9rem; line-height: 1.6;">
                        点击图谱中的节点以查看详细内容，或进行激活扩散分析。
                    </div>
                    
                    <div class="node-detail-card" id="node-detail">
                        <div class="tag" id="tag-type">FILE</div>
                        <div class="node-title" id="detail-title">---</div>
                        <div class="node-meta" id="detail-path">---</div>
                        
                        <div style="margin-top: 16px;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px;">
                                <span>激活强度 (Activation)</span>
                                <span id="detail-activation" style="color: var(--cyan)">0.00</span>
                            </div>
                            <div style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px;">
                                <div id="detail-activation-bar" style="height: 100%; background: var(--cyan); width: 0%; border-radius: 2px;"></div>
                            </div>
                        </div>

                        <div style="margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <div style="font-size: 0.75rem; color: var(--text-dim);">重要性: <span id="detail-importance" style="color: white">0.5</span></div>
                            <div style="font-size: 0.75rem; color: var(--text-dim);">访问次数: <span id="detail-access" style="color: white">0</span></div>
                        </div>

                        <button class="btn-activate" id="btn-ignite">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                            以此为中心激发联想
                        </button>
                    </div>
                </div>

                <div class="memory-log">
                    <h3>最近演化记录</h3>
                    <div id="log-list">
                        <div class="log-item" style="color: var(--text-dim); font-size: 0.8rem;">尚未检测到最近变动...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
    let graphData = { nodes: [], links: [] };
    let Graph = null;
    let selectedNode = null;
    let showLabels = true;
    let highlightNodes = new Set();
    let highlightLinks = new Set();
    let hoverNode = null;

    const COLORS = {
        FILE: '#6366f1',    // Indigo
        CONCEPT: '#ec4899'  // Pink
    };

    const EDGE_COLORS = {
        relates: '#94a3b8',
        causes: '#f59e0b',
        continues: '#10b981',
        contrasts: '#ef4444',
        mentions: '#06b6d4',
        associates: '#8b5cf6'
    };

    // 初始化图谱
    async function init() {
        try {
            const stats = await fetch('api/stats').then(res => res.json());
            const data = await fetch('api/graph?limit_nodes=200').then(res => res.json());
            
            updateStats(stats);
            graphData = data;

            renderGraph();
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
        } catch (e) {
            console.error("Failed to load memory graph:", e);
        }
    }

    function updateStats(stats) {
        document.getElementById('stat-nodes').textContent = stats.file_nodes + stats.concept_nodes;
        document.getElementById('stat-edges').textContent = stats.total_edges;
        document.getElementById('stat-avg-act').textContent = stats.avg_activation.toFixed(3);
    }

    function renderGraph() {
        const elem = document.getElementById('graph-container');
        Graph = ForceGraph()(elem)
            .graphData(graphData)
            .nodeId('id')
            .nodeLabel(node => `${node.title}\n(${node.path || node.type})`)
            .nodeColor(node => highlightNodes.has(node.id) ? '#ffffff' : COLORS[node.type] || '#ccc')
            .nodeVal(node => Math.sqrt(node.activation + 0.1) * 3)
            .linkColor(link => highlightLinks.has(link.id) ? '#ffffff' : (EDGE_COLORS[link.type] || '#444'))
            .linkWidth(link => (highlightLinks.has(link.id) ? 3 : 1) + link.weight * 2)
            .linkDirectionalArrowLength(3)
            .linkDirectionalArrowRelPos(1)
            .linkCurvature(0.1)
            .onNodeClick(node => {
                selectNode(node);
            })
            .onNodeHover(node => {
                hoverNode = node;
                elem.style.cursor = node ? 'pointer' : null;
            })
            .nodeCanvasObject((node, ctx, globalScale) => {
                const label = node.title;
                const fontSize = 12 / globalScale;
                const size = Math.sqrt(node.activation + 0.1) * 5;

                // 绘制光圈
                if (highlightNodes.has(node.id)) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size + 4, 0, 2 * Math.PI, false);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.fill();
                }

                // 核心节点
                ctx.beginPath();
                ctx.arc(node.x, node.y, size, 0, 2 * Math.PI, false);
                ctx.fillStyle = COLORS[node.type] || '#ccc';
                ctx.fill();

                if (showLabels || highlightNodes.has(node.id) || node === hoverNode) {
                    ctx.font = `${fontSize}px Inter`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fillText(label, node.x, node.y + size + 2);
                }
            });

        // 定制力导向参数
        Graph.d3Force('charge').strength(-150);
        Graph.d3Force('link').distance(80);
    }

    function selectNode(node) {
        selectedNode = node;
        
        document.getElementById('welcome-msg').style.display = 'none';
        const card = document.getElementById('node-detail');
        card.classList.add('active');

        document.getElementById('tag-type').textContent = node.type;
        document.getElementById('detail-title').textContent = node.title;
        document.getElementById('detail-path').textContent = node.path || 'Virtual Concept';
        document.getElementById('detail-activation').textContent = node.activation.toFixed(3);
        document.getElementById('detail-activation-bar').style.width = `${Math.min(100, node.activation * 100)}%`;
        document.getElementById('detail-importance').textContent = node.importance.toFixed(2);
        document.getElementById('detail-access').textContent = node.access_count;

        // 聚焦节点
        Graph.centerAt(node.x, node.y, 1000);
        Graph.zoom(2.5, 1000);

        // 高亮邻居
        highlightNodes.clear();
        highlightLinks.clear();
        highlightNodes.add(node.id);
        graphData.links.forEach(link => {
            if (link.source.id === node.id || link.target.id === node.id) {
                highlightLinks.add(link.id);
                highlightNodes.add(link.source.id);
                highlightNodes.add(link.target.id);
            }
        });
        Graph.refresh();
    }

    async function igniteActivation() {
        if (!selectedNode) return;
        
        const btn = document.getElementById('btn-ignite');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '正在联想...';
        btn.disabled = true;

        try {
            const results = await fetch('api/activate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seed_ids: [selectedNode.id], max_depth: 2 })
            }).then(res => res.json());

            highlightNodes.clear();
            highlightLinks.clear();
            highlightNodes.add(selectedNode.id);

            // 展示激活路径
            results.forEach(res => {
                highlightNodes.add(res.id);
                // 简单的粒子效果模拟
                Graph.emitParticle(graphData.links.find(l => l.target.id === res.id && l.source.id === selectedNode.id) || {});
            });

            // 更新日志
            const logList = document.getElementById('log-list');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<span style="color:var(--indigo)">[ACTIVATE]</span> 从 "${selectedNode.title}" 联想到了 ${results.length} 个相关节点`;
            logList.prepend(item);

            Graph.refresh();

        } catch (e) {
            console.error(e);
        } finally {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    }

    // 事件绑定
    document.getElementById('btn-toggle-labels').addEventListener('click', () => {
        showLabels = !showLabels;
        Graph.refresh();
    });

    document.getElementById('btn-ignite').addEventListener('click', igniteActivation);

    document.getElementById('search-input').addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        if (!val) {
            highlightNodes.clear();
            Graph.refresh();
            return;
        }
        highlightNodes.clear();
        graphData.nodes.forEach(n => {
            if (n.title.toLowerCase().includes(val) || (n.path && n.path.toLowerCase().includes(val))) {
                highlightNodes.add(n.id);
            }
        });
        Graph.refresh();
    });

    // 自动刷新同步 (可选)
    // setInterval(init, 30000);

    init();
</script>
</body>
</html>
